    EntitlementGrant:
      description: The grant.
      example:
        amount: 100
        metadata:
          stripePaymentId: pi_4OrAkhLvyihio9p51h9iiFnB
        effectiveAt: 2023-01-01T01:01:01.001Z
        entitlementId: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        annotations:
          issueAfterReset: true
        priority: 1
        minRolloverAmount: 100
        expiresAt: 2023-01-01T01:01:01.001Z
        recurrence: ""
        createdAt: 2024-01-01T01:01:01.001Z
        deletedAt: 2024-01-01T01:01:01.001Z
        maxRolloverAmount: 100
        nextRecurrence: 2023-01-01T01:01:01.001Z
        expiration: ""
        id: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        voidedAt: 2023-01-01T01:01:01.001Z
        updatedAt: 2024-01-01T01:01:01.001Z
      properties:
        createdAt:
          description: Timestamp of when the resource was created.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Creation Time
          type: string
        updatedAt:
          description: Timestamp of when the resource was last updated.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Last Update Time
          type: string
        deletedAt:
          description: Timestamp of when the resource was permanently deleted.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Deletion Time
          type: string
        amount:
          description: The amount to grant. Should be a positive number.
          example: 100
          format: double
          minimum: 0
          type: number
        priority:
          description: |-
            The priority of the grant. Grants with higher priority are applied first.
            Priority is a positive decimal numbers. With lower numbers indicating higher importance.
            For example, a priority of 1 is more urgent than a priority of 2.
            When there are several grants available for the same subject, the system selects the grant with the highest priority.
            In cases where grants share the same priority level, the grant closest to its expiration will be used first.
            In the case of two grants have identical priorities and expiration dates, the system will use the grant that was created first.
          example: 1
          format: uint8
          maximum: 255
          minimum: 1
          type: integer
        effectiveAt:
          description: Effective date for grants and anchor for recurring grants.
            Provided value will be ceiled to metering windowSize (minute).
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        expiration:
          allOf:
          - $ref: '#/components/schemas/ExpirationPeriod'
          description: The grant expiration definition
        maxRolloverAmount:
          default: 0
          description: |-
            Grants are rolled over at reset, after which they can have a different balance compared to what they had before the reset.
            Balance after the reset is calculated as: Balance_After_Reset = MIN(MaxRolloverAmount, MAX(Balance_Before_Reset, MinRolloverAmount))
          example: 100
          format: double
          type: number
        minRolloverAmount:
          default: 0
          description: |-
            Grants are rolled over at reset, after which they can have a different balance compared to what they had before the reset.
            Balance after the reset is calculated as: Balance_After_Reset = MIN(MaxRolloverAmount, MAX(Balance_Before_Reset, MinRolloverAmount))
          example: 100
          format: double
          type: number
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: The grant metadata.
          example:
            stripePaymentId: pi_4OrAkhLvyihio9p51h9iiFnB
        id:
          description: Readonly unique ULID identifier.
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          readOnly: true
          type: string
        entitlementId:
          description: The unique entitlement ULID that the grant is associated with.
          example: 01ARZ3NDEKTSV4RRFFQ69G5FAV
          readOnly: true
          type: string
        nextRecurrence:
          description: The next time the grant will recurr.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        expiresAt:
          description: The time the grant expires.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          type: string
        voidedAt:
          description: The time the grant was voided.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        recurrence:
          allOf:
          - $ref: '#/components/schemas/RecurringPeriod'
          description: The recurrence period of the grant.
        annotations:
          allOf:
          - $ref: '#/components/schemas/Annotations'
          description: Grant annotations
          example:
            issueAfterReset: true
      required:
      - amount
      - createdAt
      - effectiveAt
      - entitlementId
      - expiration
      - id
      - updatedAt
