    MeterQueryRequest:
      description: A meter query request.
      example:
        filterGroupBy:
          model:
          - gpt-4-turbo
          - gpt-4o
          type:
          - prompt
        windowSize: DAY
        clientId: f74e58ed-94ce-4041-ae06-cf45420451a3
        subject:
        - subject-1
        - subject-2
        advancedMeterGroupByFilters:
          model:
            $in:
            - gpt-4
            - gpt-4o
          type:
            $eq: input
        from: 2023-01-01T01:01:01.001Z
        to: 2023-01-01T01:01:01.001Z
        groupBy:
        - model
        - type
        filterCustomerId:
        - id-1
        - id-2
        windowTimeZone: UTC
      properties:
        clientId:
          description: |-
            Client ID
            Useful to track progress of a query.
          example: f74e58ed-94ce-4041-ae06-cf45420451a3
          maxLength: 36
          minLength: 1
          type: string
        from:
          description: |-
            Start date-time in RFC 3339 format.

            Inclusive.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        to:
          description: |-
            End date-time in RFC 3339 format.

            Inclusive.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        windowSize:
          allOf:
          - $ref: '#/components/schemas/WindowSize'
          description: "If not specified, a single usage aggregate will be returned\
            \ for the entirety of the specified period for each subject and group."
          example: DAY
        windowTimeZone:
          default: UTC
          description: |-
            The value is the name of the time zone as defined in the IANA Time Zone Database (http://www.iana.org/time-zones).
            If not specified, the UTC timezone will be used.
          example: UTC
          type: string
        subject:
          description: Filtering by multiple subjects.
          example:
          - subject-1
          - subject-2
          items:
            type: string
          maxItems: 100
          type: array
        filterCustomerId:
          description: Filtering by multiple customers.
          example:
          - id-1
          - id-2
          items:
            type: string
          maxItems: 100
          type: array
        filterGroupBy:
          additionalProperties:
            items:
              type: string
          description: Simple filter for group bys with exact match.
          example:
            model:
            - gpt-4-turbo
            - gpt-4o
            type:
            - prompt
        advancedMeterGroupByFilters:
          additionalProperties:
            $ref: '#/components/schemas/FilterString'
          description: |-
            Optional advanced meter group by filters.
