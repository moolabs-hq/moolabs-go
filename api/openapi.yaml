        in: path
        name: entitlementId
        required: true
        schema:
          type: string
        style: simple
      - description: "Start of time range to query entitlement: date-time in RFC 3339\
          \ format. Defaults to the last reset. Gets truncated to the granularity\
          \ of the underlying meter."
