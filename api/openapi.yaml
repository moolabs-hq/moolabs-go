        role:
          $ref: '#/components/schemas/AccountTeamRole'
        name:
          maxLength: 255
          minLength: 1
          title: Name
          type: string
        email:
          maxLength: 255
          title: Email
          type: string
          nullable: true
        is_primary:
          default: false
          title: Is Primary
          type: boolean
        notify_on_escalation:
          default: true
          title: Notify On Escalation
          type: boolean
      required:
      - name
      - role
      title: AccountTeamMemberIn
    AccountTeamMemberOut:
      example:
        account_id: account_id
        role: role
        is_primary: true
        user_id: user_id
        name: name
        notify_on_escalation: true
        id: id
        email: email
      properties:
        id:
          title: Id
          type: string
        account_id:
