    PortalToken:
      description: |-
        A consumer portal token.

        Validator doesn't obey required for readOnly properties
        See: https://github.com/stoplightio/spectral/issues/1274
      example:
        allowedMeterSlugs:
        - tokens_total
        createdAt: 2023-01-01T01:01:01.001Z
        expired: true
        subject: customer-1
        id: 01G65Z755AFWAKHE12NY0CQ9FH
        expiresAt: 2023-01-01T01:01:01.001Z
        token: om_portal_IAnD3PpWW2A2Wr8m9jfzeHlGX8xmCXwG.y5q4S-AWqFu6qjfaFz0zQq4Ez28RsnyVwJffX5qxMvo
      properties:
        id:
          description: ULID (Universally Unique Lexicographically Sortable Identifier).
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          readOnly: true
          type: string
        subject:
          example: customer-1
          type: string
        expiresAt:
          description: "[RFC3339](https://tools.ietf.org/html/rfc3339) formatted date-time\
            \ string in UTC."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          type: string
        expired:
          readOnly: true
          type: boolean
        createdAt:
          description: "[RFC3339](https://tools.ietf.org/html/rfc3339) formatted date-time\
            \ string in UTC."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          type: string
        token:
          description: The token is only returned at creation.
          example: om_portal_IAnD3PpWW2A2Wr8m9jfzeHlGX8xmCXwG.y5q4S-AWqFu6qjfaFz0zQq4Ez28RsnyVwJffX5qxMvo
          readOnly: true
          type: string
        allowedMeterSlugs:
          description: "Optional, if defined only the specified meters will be allowed."
          example:
          - tokens_total
          items:
            type: string
          type: array
      required:
      - subject
