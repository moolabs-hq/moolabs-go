          allOf:
          - $ref: '#/components/schemas/MarketplaceListing'
          description: The marketplace listing that this installed app is based on.
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AppStatus'
          description: Status of the app connection.
          readOnly: true
      required:
      - createdAt
      - id
      - listing
      - name
      - status
      - updatedAt
    AppCapability:
      description: |-
        App capability.

        Capabilities only exist in config so they don't extend the Resource model.
      example:
        type: collectPayments
        key: stripe_collect_payment
        name: Collect Payments
        description: Stripe payments collects outstanding revenue with Stripe customer's
          default payment method.
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/AppCapabilityType'
          description: The capability type.
        key:
          description: Key
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          type: string
        name:
          description: The capability name.
          type: string
        description:
          description: The capability description.
          type: string
      required:
      - description
      - key
      - name
      - type
    AppCapabilityType:
      description: App capability type.
      enum:
      - reportUsage
      - reportEvents
      - calculateTax
      - invoiceCustomers
      - collectPayments
      type: string
    AppPaginatedResponse:
      description: Paginated response
      example:
        pageSize: 100
        page: 1
        totalCount: 500
        items:
        - id: 01G65Z755AFWAKHE12NY0CQ9FH
          type: stripe
          name: Stripe
          status: ready
          listing:
            type: stripe
            name: Stripe
            description: Stripe interation allows you to collect payments with Stripe.
            capabilities:
            - type: calculateTax
              key: stripe_calculate_tax
              name: Calculate Tax
              description: Stripe Tax calculates tax portion of the invoices.
            - type: invoiceCustomers
              key: stripe_invoice_customers
              name: Invoice Customers
              description: Stripe invoices customers with due amount.
            - type: collectPayments
              key: stripe_collect_payments
              name: Collect Payments
              description: Stripe payments collects outstanding revenue with Stripe
                customer's default payment method.
            installMethods:
            - with_oauth2
            - with_api_key
          createdAt: 2024-01-01T01:01:01.001Z
          updatedAt: 2024-01-01T01:01:01.001Z
          stripeAccountId: acct_123456789
          livemode: true
          maskedAPIKey: sk_live_************abc
        - id: 01G65Z755AFWAKHE12NY0CQ9FH
          type: stripe
          name: Stripe
          status: ready
          listing:
            type: stripe
            name: Stripe
            description: Stripe interation allows you to collect payments with Stripe.
            capabilities:
            - type: calculateTax
              key: stripe_calculate_tax
              name: Calculate Tax
              description: Stripe Tax calculates tax portion of the invoices.
            - type: invoiceCustomers
              key: stripe_invoice_customers
              name: Invoice Customers
              description: Stripe invoices customers with due amount.
            - type: collectPayments
              key: stripe_collect_payments
              name: Collect Payments
              description: Stripe payments collects outstanding revenue with Stripe
                customer's default payment method.
            installMethods:
            - with_oauth2
            - with_api_key
          createdAt: 2024-01-01T01:01:01.001Z
          updatedAt: 2024-01-01T01:01:01.001Z
          stripeAccountId: acct_123456789
          livemode: true
          maskedAPIKey: sk_live_************abc
      properties:
        totalCount:
          description: The total number of items.
          example: 500
          type: integer
        page:
          description: The page index.
          example: 1
          type: integer
        pageSize:
          description: The maximum number of items per page.
          example: 100
          type: integer
        items:
          description: The items in the current page.
          items:
            $ref: '#/components/schemas/App'
          type: array
