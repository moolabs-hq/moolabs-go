  /v1/integrations/moometer/webhooks/moometer:
    post:
      description: |-
        Handle Moo-meter webhook CloudEvent.

        This endpoint receives CloudEvents from Moo-meter and normalizes them
        into CLS usage events.

        **CloudEvent Format:**
        Moo-meter sends CloudEvents in CloudEvents v1.0 format:
        ```json
        {
          "specversion": "1.0",
          "type": "usage",
          "id": "event-id-123",
          "time": "2026-01-13T21:00:00Z",
          "source": "https://api.openmeter.io/v1/meters/meter-slug",
          "subject": "customer-id-123",
          "data": {
            "value": 100,
            "meter": "meter-slug",
            ...
          }
        }
        ```

        Or wrapped format (API v2):
        ```json
        {
          "event": {
            "specversion": "1.0",
            "type": "usage",
            ...
          },
          "ingestedAt": "...",
          "storedAt": "..."
        }
        ```

        **Request Headers:**
        - `X-Moometer-Signature` (optional): Webhook signature for verification

        **Query Parameters:**
        - `tenant_id` (required): Tenant identifier
        - `pool_id` (required): Credit pool identifier

        **Response:**
        - 201: Event processed successfully
        - 400: Invalid event format or missing required fields
        - 500: Processing error

        **Idempotency:**
        - Uses CloudEvent `id` field as idempotency key
        - Duplicate events are safely ignored (UNIQUE constraint)
      operationId: openmeterWebhook
      parameters:
      - explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          title: Tenant Id
          type: string
        style: form
      - explode: true
        in: query
        name: pool_id
        required: false
        schema:
          format: uuid
          title: Pool Id
          type: string
        style: form
      responses:
        "201":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Openmeter Webhook
      tags:
      - integrations
  /v1/integrations/moometer/webhooks/moometer/batch:
    post:
      description: |-
        Handle batch of Moo-meter webhook CloudEvents.

        Processes multiple CloudEvents in a single request.
        Each event is processed independently (idempotent).

        **Request Body:**
        ```json
        {
          "events": [
            { "specversion": "1.0", "type": "usage", ... },
            { "specversion": "1.0", "type": "usage", ... }
          ]
        }
        ```

        **Response:**
        - 201: All events processed (some may have failed individually)
        - Results include per-event status

        **Query Parameters:**
        - `tenant_id` (required): Tenant identifier
        - `pool_id` (required): Credit pool identifier
      operationId: openmeterWebhookBatch
      parameters:
      - explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          title: Tenant Id
          type: string
        style: form
      - explode: true
        in: query
        name: pool_id
        required: false
        schema:
          format: uuid
          title: Pool Id
          type: string
        style: form
      responses:
        "201":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Openmeter Webhook Batch
      tags:
      - integrations
