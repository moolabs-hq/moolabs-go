                $ref: '#/components/schemas/ForbiddenProblemResponse'
          description: The server understood the request but refuses to authorize
            it.
        "412":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/PreconditionFailedProblemResponse'
          description: One or more conditions given in the request header fields evaluated
            to false when tested on the server.
        "500":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/InternalServerErrorProblemResponse'
          description: The server encountered an unexpected condition that prevented
            it from fulfilling the request.
        "503":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ServiceUnavailableProblemResponse'
          description: "The server is currently unable to handle the request due to\
            \ a temporary overload or scheduled maintenance, which will likely be\
            \ alleviated after some delay."
        default:
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/UnexpectedProblemResponse'
          description: An unexpected error response.
      summary: List grants
      tags:
      - Entitlements
