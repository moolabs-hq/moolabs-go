  /v1/arc/webhooks/inbound/resend:
    post:
      description: |-
        Receive a customer email reply routed to a tenant inbound address.

        Resend sends a JSON payload describing the received email. We look
        up the target tenant via the recipient's plus-address tag
        (``billing+t-<tenant_uuid>@...``), verify the Svix signature
        headers using the tenant's ``inbound_secret``, persist an
        ``ArcCommunication(direction=INBOUND, status=RECEIVED)``, and hand
        off to the classifier agent.

        Resend webhooks are delivered through Svix and signed with the
        canonical Svix scheme (``svix-id`` / ``svix-timestamp`` /
        ``svix-signature`` headers, ``HMAC-SHA256({id}.{ts}.{body}, secret)``
        base64-encoded with a ``v1,`` version tag).  We forward the full
        header set to the verifier rather than picking individual headers
        so the Svix SDK can do its own header-name normalization (some
        proxies lower-case, some don't; some use ``webhook-*`` instead of
        ``svix-*``).  The earlier implementation only read a single
        ``X-Resend-Signature`` header that Resend never sends, so every
        inbound email returned 401 and stayed parked in Resend's retry
        queue indefinitely.

        The classifier never mutates customer-facing state — it queues an
        ``ArcTask`` for a human review (see ``app/agents/inbound_classifier.py``).
      operationId: resendInboundWebhook
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Resend Inbound Webhook
      tags:
      - ArcWebhooks
