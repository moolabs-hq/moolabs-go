    InvoicePendingLinesActionFiltersInput:
      description: InvoicePendingLinesActionFiltersInput specifies which lines to
        include in the invoice.
      properties:
        lineIds:
          description: |-
            The pending line items to include in the invoice, if not provided:
            - all line items that have invoice_at < asOf will be included
            - [progressive billing only] all usage based line items will be included up to asOf, new
            usage-based line items will be staged for the rest of the billing cycle

            All lineIDs present in the list, must exists and must be invoicable as of asOf, or the action will fail.
          items:
            description: ULID (Universally Unique Lexicographically Sortable Identifier).
            example: 01G65Z755AFWAKHE12NY0CQ9FH
            pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
            type: string
          type: array
    InvoicePendingLinesActionInput:
      description: |-
        BillingInvoiceActionInput is the input for creating an invoice.

        Invoice creation is always based on already pending line items created by the billingCreateLineByCustomer
        operation. Empty invoices are not allowed.
      example:
        asOf: 2023-01-01T01:01:01.001Z
        customerId: 01G65Z755AFWAKHE12NY0CQ9FH
        filters: ""
        progressiveBillingOverride: true
      properties:
        filters:
          allOf:
          - $ref: '#/components/schemas/InvoicePendingLinesActionFiltersInput'
          description: Filters to apply when creating the invoice.
        asOf:
          description: |-
            The time as of which the invoice is created.

            If not provided, the current time is used.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        customerId:
          description: The customer ID for which to create the invoice.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
        progressiveBillingOverride:
          description: |-
            Override the progressive billing setting of the customer.

            Can be used to disable/enable progressive billing in case the business logic
            requires it, if not provided the billing profile's progressive billing setting will be used.
          type: boolean
      required:
      - customerId
    InvoiceReference:
      description: Reference to an invoice.
      properties:
        id:
          description: The ID of the invoice.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          readOnly: true
          type: string
        number:
          allOf:
          - $ref: '#/components/schemas/InvoiceNumber'
          description: The number of the invoice.
          readOnly: true
      required:
      - id
    InvoiceReplaceUpdate:
      description: InvoiceReplaceUpdate represents the update model for an invoice.
      example:
        metadata: "{}"
        workflow: ""
        supplier: ""
        description: description
        lines:
        - metadata: "{}"
          period: ""
          invoiceAt: 2023-01-01T01:01:01.001Z
          rateCard: ""
          price: ""
          name: name
          description: description
          taxConfig: ""
          id: 01G65Z755AFWAKHE12NY0CQ9FH
          featureKey: featureKey
        - metadata: "{}"
          period: ""
          invoiceAt: 2023-01-01T01:01:01.001Z
          rateCard: ""
          price: ""
          name: name
          description: description
          taxConfig: ""
          id: 01G65Z755AFWAKHE12NY0CQ9FH
          featureKey: featureKey
        customer: ""
      properties:
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        supplier:
          allOf:
          - $ref: '#/components/schemas/BillingPartyReplaceUpdate'
          description: The supplier of the lines included in the invoice.
        customer:
          allOf:
          - $ref: '#/components/schemas/BillingPartyReplaceUpdate'
          description: The customer the invoice is sent to.
        lines:
          description: The lines included in the invoice.
          items:
            $ref: '#/components/schemas/InvoiceLineReplaceUpdate'
          type: array
        workflow:
          allOf:
          - $ref: '#/components/schemas/InvoiceWorkflowReplaceUpdate'
          description: The workflow settings for the invoice.
      required:
      - customer
      - lines
      - supplier
      - workflow
    InvoiceSimulationInput:
      description: InvoiceSimulationInput is the input for simulating an invoice.
      example:
        number: ""
        currency: ""
        lines:
        - metadata: "{}"
          period: ""
          invoiceAt: 2023-01-01T01:01:01.001Z
          rateCard: ""
          quantity: ""
          price: ""
          name: name
          description: description
          taxConfig: ""
          id: 01G65Z755AFWAKHE12NY0CQ9FH
          featureKey: featureKey
          preLinePeriodQuantity: ""
        - metadata: "{}"
          period: ""
          invoiceAt: 2023-01-01T01:01:01.001Z
          rateCard: ""
          quantity: ""
          price: ""
          name: name
          description: description
          taxConfig: ""
          id: 01G65Z755AFWAKHE12NY0CQ9FH
          featureKey: featureKey
          preLinePeriodQuantity: ""
      properties:
        number:
          allOf:
          - $ref: '#/components/schemas/InvoiceNumber'
          description: The number of the invoice.
        currency:
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          description: |-
            Currency for all invoice line items.

            Multi currency invoices are not supported yet.
        lines:
          description: Lines to be included in the generated invoice.
          items:
            $ref: '#/components/schemas/InvoiceSimulationLine'
          type: array
      required:
      - currency
      - lines
    InvoiceSimulationLine:
      description: InvoiceSimulationLine represents a usage-based line item that can
        be input to the simulation endpoint.
      example:
        metadata: "{}"
        period: ""
        invoiceAt: 2023-01-01T01:01:01.001Z
        rateCard: ""
        quantity: ""
        price: ""
        name: name
        description: description
        taxConfig: ""
        id: 01G65Z755AFWAKHE12NY0CQ9FH
        featureKey: featureKey
        preLinePeriodQuantity: ""
      properties:
        name:
          description: Human-readable name for the resource. Between 1 and 256 characters.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        taxConfig:
          allOf:
          - $ref: '#/components/schemas/TaxConfig'
          deprecated: true
          description: Tax config specify the tax configuration for this line.
        period:
          allOf:
          - $ref: '#/components/schemas/Period'
          description: |-
            Period of the line item applies to for revenue recognition pruposes.

            Billing always treats periods as start being inclusive and end being exclusive.
        invoiceAt:
          description: The time this line item should be invoiced.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        price:
          allOf:
          - $ref: '#/components/schemas/RateCardUsageBasedPrice'
          deprecated: true
          description: Price of the usage-based item being sold.
        featureKey:
          deprecated: true
          description: The feature that the usage is based on.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          type: string
        rateCard:
          allOf:
          - $ref: '#/components/schemas/InvoiceUsageBasedRateCard'
          description: |-
            The rate card that is used for this line.

            The rate card captures the intent of the price and discounts for the usage-based item.
        quantity:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The quantity of the item being sold.
        preLinePeriodQuantity:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: "The quantity of the item used before this line's period, if\
            \ the line is billed progressively."
        id:
          description: |-
            ID of the line. If not specified it will be auto-generated.

            When discounts are specified, this must be provided, so that the discount can reference it.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
      required:
      - invoiceAt
      - name
      - period
      - quantity
    InvoiceStatus:
      description: InvoiceStatus describes the status of an invoice.
      enum:
      - gathering
      - draft
      - issuing
      - issued
      - payment_processing
      - overdue
      - paid
      - uncollectible
      - voided
      type: string
    InvoiceStatusDetails:
      description: |-
        InvoiceStatusDetails represents the details of the invoice status.

        API users are encouraged to rely on the immutable/failed/avaliableActions fields to determine
        the next steps of the invoice instead of the extendedStatus field.
      properties:
        immutable:
          description: Is the invoice editable?
          readOnly: true
          type: boolean
        failed:
          description: Is the invoice in a failed state?
          readOnly: true
          type: boolean
        extendedStatus:
          description: Extended status information for the invoice.
          readOnly: true
          type: string
        availableActions:
          allOf:
          - $ref: '#/components/schemas/InvoiceAvailableActions'
          description: The actions that can be performed on the invoice.
      required:
      - availableActions
      - extendedStatus
      - failed
      - immutable
    InvoiceTotals:
      description: Totals contains the summaries of all calculations for the invoice.
      properties:
        amount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: "The total value of the line before taxes, discounts and commitments."
          readOnly: true
        chargesTotal:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The amount of value of the line that are due to additional
            charges.
          readOnly: true
        discountsTotal:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The amount of value of the line that are due to discounts.
          readOnly: true
        taxesInclusiveTotal:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The total amount of taxes that are included in the line.
          readOnly: true
        taxesExclusiveTotal:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The total amount of taxes that are added on top of amount from
            the line.
          readOnly: true
        taxesTotal:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The total amount of taxes for this line.
          readOnly: true
        total:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: "The total amount value of the line after taxes, discounts\
            \ and commitments."
          readOnly: true
      required:
      - amount
      - chargesTotal
      - discountsTotal
      - taxesExclusiveTotal
      - taxesInclusiveTotal
      - taxesTotal
      - total
    InvoiceType:
      description: |-
        InvoiceType represents the type of invoice.

        The type of invoice determines the purpose of the invoice and how it should be handled.
      enum:
      - standard
      - credit_note
      type: string
    InvoiceUsageBasedRateCard:
      description: InvoiceUsageBasedRateCard represents the rate card (intent) for
        an usage-based line.
      properties:
        featureKey:
          description: The feature the customer is entitled to use.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          title: Feature key
          type: string
        taxConfig:
          allOf:
          - $ref: '#/components/schemas/TaxConfig'
          description: |-
            The tax config of the rate card.
            When undefined, the tax config of the feature or the default tax config of the plan is used.
          title: Tax config
        price:
          allOf:
          - $ref: '#/components/schemas/RateCardUsageBasedPrice'
          description: |-
            The price of the rate card.
            When null, the feature or service is free.
          nullable: true
        discounts:
          allOf:
          - $ref: '#/components/schemas/BillingDiscounts'
          description: The discounts that are applied to the line.
      required:
      - price
    InvoiceWorkflowInvoicingSettingsReplaceUpdate:
      description: InvoiceWorkflowInvoicingSettingsReplaceUpdate represents the update
        model for the invoicing settings of an invoice workflow.
      properties:
        autoAdvance:
          default: true
          description: Whether to automatically issue the invoice after the draftPeriod
            has passed.
          type: boolean
        draftPeriod:
          default: P0D
          description: The period for the invoice to be kept in draft status for manual
            reviews.
          example: P1D
          format: ISO8601
          type: string
        dueAfter:
          default: P30D
          description: |-
            The period after which the invoice is due.
            With some payment solutions it's only applicable for manual collection method.
          example: P30D
          format: ISO8601
          type: string
        defaultTaxConfig:
          allOf:
          - $ref: '#/components/schemas/TaxConfig'
          description: Default tax configuration to apply to the invoices.
    InvoiceWorkflowReplaceUpdate:
      description: |-
        InvoiceWorkflowReplaceUpdate represents the update model for an invoice workflow.

        Fields that are immutable a re removed from the model. This is based on InvoiceWorkflowSettings.
      properties:
        workflow:
          allOf:
          - $ref: '#/components/schemas/InvoiceWorkflowSettingsReplaceUpdate'
          description: The workflow used for this invoice.
      required:
      - workflow
    InvoiceWorkflowSettings:
      description: |-
        InvoiceWorkflowSettings represents the workflow settings used by the invoice.

        This is a clone of the billing profile's workflow settings at the time of invoice creation
        with customer overrides considered.
      properties:
        apps:
          allOf:
          - $ref: '#/components/schemas/BillingProfileAppsOrReference'
          description: The apps that will be used to orchestrate the invoice's workflow.
          readOnly: true
        sourceBillingProfileId:
          description: |-
            sourceBillingProfileID is the billing profile on which the workflow was based on.

            The profile is snapshotted on invoice creation, after which it can be altered independently
            of the profile itself.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          readOnly: true
          type: string
        workflow:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflow'
          description: The workflow details used by this invoice.
      required:
      - sourceBillingProfileId
      - workflow
    InvoiceWorkflowSettingsReplaceUpdate:
      description: |-
        Mutable workflow settings for an invoice.

        Other fields on the invoice's workflow are not mutable, they serve as a history of the invoice's workflow
        at creation time.
      properties:
        invoicing:
          allOf:
          - $ref: '#/components/schemas/InvoiceWorkflowInvoicingSettingsReplaceUpdate'
          description: The invoicing settings for this workflow
        payment:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowPaymentSettings'
          description: The payment settings for this workflow
      required:
      - invoicing
      - payment
    IssueAfterReset:
      description: Issue after reset
      properties:
        amount:
          description: The initial grant amount
          format: double
          minimum: 0
          title: Initial grant amount
          type: number
        priority:
          default: 1
          description: The priority of the issue after reset
          format: uint8
          maximum: 255
          minimum: 1
          title: Issue grant after reset priority
          type: integer
      required:
      - amount
    ListAppsRequest:
      description: Query params for listing installed apps
      properties:
        page:
          default: 1
          description: |-
            Page index.

            Default is 1.
          example: 1
          minimum: 1
          type: integer
        pageSize:
          default: 100
          description: |-
            The maximum number of items per page.

            Default is 100.
          example: 100
          maximum: 1000
          minimum: 1
          type: integer
    ListEntitlementsResult:
      description: List entitlements result
      oneOf:
      - items:
          $ref: '#/components/schemas/Entitlement'
        type: array
      - $ref: '#/components/schemas/EntitlementPaginatedResponse'
    ListFeaturesResult:
      description: List features result
      oneOf:
      - items:
          $ref: '#/components/schemas/Feature'
        type: array
      - $ref: '#/components/schemas/FeaturePaginatedResponse'
    MarketplaceInstallRequestPayload:
      description: Marketplace install request payload.
      example:
        createBillingProfile: true
        name: name
      properties:
        name:
          description: |-
            Name of the application to install.

            If name is not provided defaults to the marketplace listing's name.
          type: string
        createBillingProfile:
          default: true
          description: |-
            If true, a billing profile will be created for the app.
            The Stripe app will be also set as the default billing profile if the current default is a Sandbox app.
          type: boolean
    MarketplaceInstallResponse:
      description: Marketplace install response.
      example:
        app:
          id: 01G65Z755AFWAKHE12NY0CQ9FH
          type: stripe
          name: Stripe
          status: ready
          listing:
            type: stripe
            name: Stripe
            description: Stripe interation allows you to collect payments with Stripe.
            capabilities:
            - type: calculateTax
              key: stripe_calculate_tax
              name: Calculate Tax
              description: Stripe Tax calculates tax portion of the invoices.
            - type: invoiceCustomers
              key: stripe_invoice_customers
              name: Invoice Customers
              description: Stripe invoices customers with due amount.
            - type: collectPayments
              key: stripe_collect_payments
              name: Collect Payments
              description: Stripe payments collects outstanding revenue with Stripe
                customer's default payment method.
            installMethods:
            - with_oauth2
            - with_api_key
          createdAt: 2024-01-01T01:01:01.001Z
          updatedAt: 2024-01-01T01:01:01.001Z
          stripeAccountId: acct_123456789
          livemode: true
          maskedAPIKey: sk_live_************abc
        defaultForCapabilityTypes:
        - reportUsage
        - reportUsage
      properties:
        app:
          $ref: '#/components/schemas/App'
        defaultForCapabilityTypes:
          description: Default for capabilities
          items:
            $ref: '#/components/schemas/AppCapabilityType'
          type: array
      required:
      - app
      - defaultForCapabilityTypes
    MarketplaceListing:
      description: |-
        A marketplace listing.
        Represent an available app in the app marketplace that can be installed to the organization.

        Marketplace apps only exist in config so they don't extend the Resource model.
      example:
        type: stripe
        name: Stripe
        description: Stripe interation allows you to collect payments with Stripe.
        capabilities:
        - type: calculateTax
          key: stripe_calculate_tax
          name: Calculate Tax
          description: Stripe Tax calculates tax portion of the invoices.
        - type: invoiceCustomers
          key: stripe_invoice_customers
          name: Invoice Customers
          description: Stripe invoices customers with due amount.
        - type: collectPayments
          key: stripe_collect_payments
          name: Collect Payments
          description: Stripe payments collects outstanding revenue with Stripe customer's
            default payment method.
        installMethods:
        - with_oauth2
        - with_api_key
      properties:
        type:
          allOf:
          - $ref: '#/components/schemas/AppType'
          description: The app's type
        name:
          description: The app's name.
          type: string
        description:
          description: The app's description.
          type: string
        capabilities:
          description: The app's capabilities.
          items:
            $ref: '#/components/schemas/AppCapability'
          type: array
        installMethods:
          description: |-
            Install methods.

            List of methods to install the app.
          items:
            $ref: '#/components/schemas/InstallMethod'
          type: array
      required:
      - capabilities
      - description
      - installMethods
      - name
      - type
    MarketplaceListingPaginatedResponse:
      description: Paginated response
      example:
        pageSize: 100
        page: 1
        totalCount: 500
        items:
        - type: stripe
          name: Stripe
          description: Stripe interation allows you to collect payments with Stripe.
          capabilities:
          - type: calculateTax
            key: stripe_calculate_tax
            name: Calculate Tax
            description: Stripe Tax calculates tax portion of the invoices.
          - type: invoiceCustomers
            key: stripe_invoice_customers
            name: Invoice Customers
            description: Stripe invoices customers with due amount.
          - type: collectPayments
            key: stripe_collect_payments
            name: Collect Payments
            description: Stripe payments collects outstanding revenue with Stripe
              customer's default payment method.
          installMethods:
          - with_oauth2
          - with_api_key
        - type: stripe
          name: Stripe
          description: Stripe interation allows you to collect payments with Stripe.
          capabilities:
          - type: calculateTax
            key: stripe_calculate_tax
            name: Calculate Tax
            description: Stripe Tax calculates tax portion of the invoices.
          - type: invoiceCustomers
            key: stripe_invoice_customers
            name: Invoice Customers
            description: Stripe invoices customers with due amount.
          - type: collectPayments
            key: stripe_collect_payments
            name: Collect Payments
            description: Stripe payments collects outstanding revenue with Stripe
              customer's default payment method.
          installMethods:
          - with_oauth2
          - with_api_key
      properties:
        totalCount:
          description: The total number of items.
          example: 500
          type: integer
        page:
          description: The page index.
          example: 1
          type: integer
        pageSize:
          description: The maximum number of items per page.
          example: 100
          type: integer
        items:
          description: The items in the current page.
          items:
            $ref: '#/components/schemas/MarketplaceListing'
          type: array
      required:
      - items
      - page
      - pageSize
      - totalCount
    MeasureUsageFrom:
      description: Measure usage from
      oneOf:
      - $ref: '#/components/schemas/MeasureUsageFromPreset'
      - $ref: '#/components/schemas/MeasureUsageFromTime'
    MeasureUsageFromPreset:
      description: Start of measurement options
      enum:
      - CURRENT_PERIOD_START
      - NOW
      type: string
      x-enum-varnames:
      - CurrentPeriodStart
      - Now
    MeasureUsageFromTime:
      description: "[RFC3339](https://tools.ietf.org/html/rfc3339) formatted date-time\
        \ string in UTC."
      example: 2023-01-01T01:01:01.001Z
      format: date-time
      type: string
    Metadata:
      additionalProperties:
        type: string
      description: |-
        Set of key-value pairs.
        Metadata can be used to store additional information about a resource.
      example:
        externalId: 019142cc-a016-796a-8113-1a942fecd26d
      x-go-type: "map[string]string"
    Meter:
      description: A meter is a configuration that defines how to match and aggregate
        events.
      example:
        id: 01G65Z755AFWAKHE12NY0CQ9FH
        slug: tokens_total
        name: Tokens Total
        description: AI Token Usage
        aggregation: SUM
        eventType: prompt
        valueProperty: $.tokens
        groupBy:
          model: $.model
          type: $.type
        createdAt: 2024-01-01T01:01:01.001Z
        updatedAt: 2024-01-01T01:01:01.001Z
      properties:
        id:
          description: A unique identifier for the resource.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          readOnly: true
          title: ID
          type: string
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        createdAt:
          description: Timestamp of when the resource was created.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Creation Time
          type: string
        updatedAt:
          description: Timestamp of when the resource was last updated.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Last Update Time
          type: string
        deletedAt:
          description: Timestamp of when the resource was permanently deleted.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Deletion Time
          type: string
        name:
          description: |-
            Human-readable name for the resource. Between 1 and 256 characters.
            Defaults to the slug if not specified.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        projectionStatus:
          description: Async ClickHouse parser reconciliation status for this meter.
          enum:
          - pending
          - ready
          - failed
          readOnly: true
          type: string
        projectionError:
          description: "Last projection reconciliation error, if projectionStatus\
            \ is failed."
          readOnly: true
          type: string
        dataHealth:
          description: Raw-event extraction health for this meter.
          enum:
          - unknown
          - healthy
          - degraded
          readOnly: true
          type: string
        dataHealthReason:
          description: Last data-health transition reason.
          readOnly: true
          type: string
        slug:
          description: |-
            A unique, human-readable identifier for the meter.
            Must consist only alphanumeric and underscore characters.
          example: tokens_total
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          type: string
        aggregation:
          allOf:
          - $ref: '#/components/schemas/MeterAggregation'
          description: The aggregation type to use for the meter.
          example: SUM
        eventType:
          description: The event type to aggregate.
          example: prompt
          minLength: 1
          type: string
        eventFrom:
          description: |-
            The date since the meter should include events.
            Useful to skip old events.
            If not specified, all historical events are included.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        valueProperty:
          description: |-
            JSONPath expression to extract the value from the ingested event's data property.

            The ingested value for SUM, AVG, MIN, and MAX aggregations is a number or a string that can be parsed to a number.

            For UNIQUE_COUNT aggregation, the ingested value must be a string. For COUNT aggregation the valueProperty is ignored.
          example: $.tokens
          minLength: 1
          type: string
        groupBy:
          additionalProperties:
            type: string
          description: |-
            Named JSONPath expressions to extract the group by values from the event data.

            Keys must be unique and consist only alphanumeric and underscore characters.
          example:
            type: $.type
        annotations:
          allOf:
          - $ref: '#/components/schemas/Annotations'
          description: Set of key-value pairs managed by the system. Cannot be modified
            by user.
          readOnly: true
          title: Annotations
          nullable: true
      required:
      - aggregation
      - createdAt
      - eventType
      - id
      - slug
      - updatedAt
    MeterAggregation:
      description: The aggregation type to use for the meter.
      enum:
      - SUM
      - COUNT
      - UNIQUE_COUNT
      - AVG
      - MIN
      - MAX
      - LATEST
      type: string
      x-enum-varnames:
      - Sum
      - Count
      - UniqueCount
      - Avg
      - Min
      - Max
      - Latest
    MeterCreate:
      description: A meter create model.
      example:
        slug: tokens_total
        name: Tokens Total
        description: AI Token Usage
        aggregation: SUM
        eventType: prompt
        valueProperty: $.tokens
        groupBy:
          model: $.model
          type: $.type
      properties:
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        name:
          description: |-
            Human-readable name for the resource. Between 1 and 256 characters.
            Defaults to the slug if not specified.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        slug:
          description: |-
            A unique, human-readable identifier for the meter.
            Must consist only alphanumeric and underscore characters.
          example: tokens_total
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          type: string
        aggregation:
          allOf:
          - $ref: '#/components/schemas/MeterAggregation'
          description: The aggregation type to use for the meter.
          example: SUM
        eventType:
          description: The event type to aggregate.
          example: prompt
          minLength: 1
          type: string
        eventFrom:
          description: |-
            The date since the meter should include events.
            Useful to skip old events.
            If not specified, all historical events are included.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        valueProperty:
          description: |-
            JSONPath expression to extract the value from the ingested event's data property.

            The ingested value for SUM, AVG, MIN, and MAX aggregations is a number or a string that can be parsed to a number.

            For UNIQUE_COUNT aggregation, the ingested value must be a string. For COUNT aggregation the valueProperty is ignored.
          example: $.tokens
          minLength: 1
          type: string
        groupBy:
          additionalProperties:
            type: string
          description: |-
            Named JSONPath expressions to extract the group by values from the event data.

            Keys must be unique and consist only alphanumeric and underscore characters.
          example:
            type: $.type
      required:
      - aggregation
      - eventType
      - slug
    MeterOrderBy:
      description: Order by options for meters.
      enum:
      - key
      - name
      - aggregation
      - createdAt
      - updatedAt
      type: string
    MeterQueryRequest:
      description: A meter query request.
      example:
        filterGroupBy:
          model:
          - gpt-4-turbo
          - gpt-4o
          type:
          - prompt
        windowSize: DAY
        clientId: f74e58ed-94ce-4041-ae06-cf45420451a3
        subject:
        - subject-1
        - subject-2
        advancedMeterGroupByFilters:
          model:
            $in:
            - gpt-4
            - gpt-4o
          type:
            $eq: input
        from: 2023-01-01T01:01:01.001Z
        to: 2023-01-01T01:01:01.001Z
        groupBy:
        - model
        - type
        filterCustomerId:
        - id-1
        - id-2
        windowTimeZone: UTC
      properties:
        clientId:
          description: |-
            Client ID
            Useful to track progress of a query.
          example: f74e58ed-94ce-4041-ae06-cf45420451a3
          maxLength: 36
          minLength: 1
          type: string
        from:
          description: |-
            Start date-time in RFC 3339 format.

            Inclusive.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        to:
          description: |-
            End date-time in RFC 3339 format.

            Inclusive.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        windowSize:
          allOf:
          - $ref: '#/components/schemas/WindowSize'
          description: "If not specified, a single usage aggregate will be returned\
            \ for the entirety of the specified period for each subject and group."
          example: DAY
        windowTimeZone:
          default: UTC
          description: |-
            The value is the name of the time zone as defined in the IANA Time Zone Database (http://www.iana.org/time-zones).
            If not specified, the UTC timezone will be used.
          example: UTC
          type: string
        subject:
          description: Filtering by multiple subjects.
          example:
          - subject-1
          - subject-2
          items:
            type: string
          maxItems: 100
          type: array
        filterCustomerId:
          description: Filtering by multiple customers.
          example:
          - id-1
          - id-2
          items:
            type: string
          maxItems: 100
          type: array
        filterGroupBy:
          additionalProperties:
            items:
              type: string
          description: Simple filter for group bys with exact match.
          example:
            model:
            - gpt-4-turbo
            - gpt-4o
            type:
            - prompt
        advancedMeterGroupByFilters:
          additionalProperties:
            $ref: '#/components/schemas/FilterString'
          description: |-
            Optional advanced meter group by filters.
            You can use this to filter for values of the meter groupBy fields.
          example:
            model:
              $in:
              - gpt-4
              - gpt-4o
            type:
              $eq: input
        groupBy:
          description: |-
            If not specified a single aggregate will be returned for each subject and time window.
            `subject` is a reserved group by value.
          example:
          - model
          - type
          items:
            type: string
          maxItems: 100
          type: array
    MeterQueryResult:
      description: The result of a meter query.
      example:
        from: 2023-01-01T00:00:00Z
        to: 2023-01-02T00:00:00Z
        windowSize: DAY
        data:
        - value: 12
          windowStart: 2023-01-01T00:00:00Z
          windowEnd: 2023-01-02T00:00:00Z
          subject: customer-1
