  /v1/topup/checkout:
    get:
      description: |-
        Redirect to Stripe Checkout for wallet top-up.

        Used by the "Top up this wallet" link in alert emails. Accepts only wallet_id
        and amount_usd so we do not expose tenant_id/pool_id to customers; looks up
        tenant and pool from the wallet when not provided.
      operationId: topupCheckout
      parameters:
      - description: Wallet to top up
        explode: true
        in: query
        name: wallet_id
        required: true
        schema:
          description: Wallet to top up
          format: uuid
          title: Wallet Id
          type: string
        style: form
      - description: Tenant ID (optional; looked up from wallet if omitted)
        explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          description: Tenant ID (optional; looked up from wallet if omitted)
          format: uuid
          title: Tenant Id
          type: string
          nullable: true
        style: form
      - description: Pool ID (optional; looked up from wallet if omitted)
        explode: true
        in: query
        name: pool_id
        required: false
        schema:
          description: Pool ID (optional; looked up from wallet if omitted)
          format: uuid
          title: Pool Id
          type: string
          nullable: true
        style: form
      - description: Amount in USD
        explode: true
        in: query
        name: amount_usd
        required: false
        schema:
          default: 50.0
          description: Amount in USD
          maximum: 10000.0
          minimum: 1.0
          title: Amount Usd
          type: number
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Topup Checkout
      tags:
      - topup
