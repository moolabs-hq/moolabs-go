          "type": "usage",
          "id": "event-id-123",
          "time": "2026-01-13T21:00:00Z",
          "source": "https://api.openmeter.io/v1/meters/meter-slug",
          "subject": "customer-id-123",
          "data": {
            "value": 100,
            "meter": "meter-slug",
            ...
          }
        }
        ```

        Or wrapped format (API v2):
        ```json
        {
          "event": {
            "specversion": "1.0",
            "type": "usage",
            ...
          },
          "ingestedAt": "...",
          "storedAt": "..."
        }
        ```

        **Request Headers:**
        - `X-OpenMeter-Signature` (optional): Webhook signature for verification

        **Query Parameters:**
        - `tenant_id` (required): Tenant identifier
        - `pool_id` (required): Credit pool identifier

        **Response:**
        - 201: Event processed successfully
        - 400: Invalid event format or missing required fields
        - 500: Processing error

        **Idempotency:**
        - Uses CloudEvent `id` field as idempotency key
        - Duplicate events are safely ignored (UNIQUE constraint)
