      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BomVarianceOut'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcuteHTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: "BOM-level variance: standard vs actual"
      tags:
      - Variance
  /api/v1/variance/decomposition:
    get:
      description: |-
        Full four-way variance decomposition for a specific feature and period.
        price + usage + volume + mix == total_variance (guaranteed).
      operationId: getVarianceDecomposition
      parameters:
      - description: Tenant UUID
        explode: true
        in: query
        name: tenant_id
        required: true
        schema:
          description: Tenant UUID
          title: Tenant Id
          type: string
        style: form
      - description: Feature key
        explode: true
        in: query
        name: feature_key
        required: true
        schema:
          description: Feature key
          title: Feature Key
          type: string
        style: form
      - description: Period start (ISO datetime)
        explode: true
        in: query
        name: period_start
        required: true
        schema:
          description: Period start (ISO datetime)
          format: date-time
          title: Period Start
          type: string
        style: form
      - description: Period end (ISO datetime)
        explode: true
        in: query
        name: period_end
        required: true
        schema:
          description: Period end (ISO datetime)
          format: date-time
          title: Period End
          type: string
        style: form
      - description: BOM template UUID
        explode: true
        in: query
        name: bom_template_id
        required: true
        schema:
          description: BOM template UUID
          title: Bom Template Id
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VarianceDecompositionOut'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcuteHTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Full four-way variance decomposition for feature+period
      tags:
      - Variance
  /api/v1/variance/compute:
    post:
      description: |-
        Operator endpoint: trigger variance computation for feature+period.
        Upserts into cost_variances table. Returns the computed variance.
      operationId: computeVariance
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComputeVarianceRequest'
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComputeVarianceResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcuteHTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: Trigger variance computation (operator)
      tags:
      - Variance
  /api/v1/cost/margins/simulate:
    post:
      description: |-
        Projects margin for a proposed deal using BOM standard costs.

        1. Loads active BOM for feature_key.
        2. Simulates cost with proposed_model_mix overrides at current rates.
        3. Computes projected revenue, cost, and margin for the simulation period.
        4. Returns risk_flags and reconciliation_basis.

        projected_margin_pct = null if proposed_price_per_event <= 0 (zero-valued-burn).
      operationId: simulateMargin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateMarginRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateMarginResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcuteHTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: ACE margin simulation — single scenario
      tags:
      - Margin Simulation
  /api/v1/cost/margins/simulate/compare:
    post:
      description: |-
        Run multiple margin simulations and return side-by-side comparison.
        Each scenario can have different feature_key, price, volume, model_mix.
        Partial failures are included with an 'error' field (does not abort all scenarios).
      operationId: compareScenarios
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScenarioRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioCompareResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcuteHTTPValidationError'
          description: Validation Error
      security:
      - APIKeyHeader: []
      summary: ACE margin simulation — multi-scenario comparison
      tags:
      - Margin Simulation
  /health/deep:
    get:
      description: Authenticated dependency readiness check for operator diagnostics.
      operationId: deepHealthCheck
      parameters:
      - explode: false
        in: header
        name: X-Metrics-Token
        required: false
        schema:
          title: X-Metrics-Token
          type: string
          nullable: true
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                additionalProperties: {}
                title: Response Deep Health Check Health Deep Get
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcuteHTTPValidationError'
          description: Validation Error
      summary: Deep Health Check
      tags:
      - ops
