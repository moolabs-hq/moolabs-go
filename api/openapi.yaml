    CustomPlanInput:
      allOf:
      - description: The template for omitting properties.
        properties:
          name:
            description: Human-readable name for the resource. Between 1 and 256 characters.
            maxLength: 256
            minLength: 1
            title: Display name
            type: string
          description:
            description: Optional description of the resource. Maximum 1024 characters.
            maxLength: 1024
            title: Description
            type: string
          metadata:
            $ref: '#/components/schemas/Metadata_1'
          alignment:
            allOf:
            - $ref: '#/components/schemas/Alignment'
            description: Alignment configuration for the plan.
          currency:
            allOf:
            - $ref: '#/components/schemas/CurrencyCode'
            description: The currency code of the plan.
            title: Currency
          billingCadence:
            description: |-
              The default billing cadence for subscriptions using this plan.
              Defines how often customers are billed using ISO8601 duration format.
              Examples: "P1M" (monthly), "P3M" (quarterly), "P1Y" (annually).
            example: P1M
            format: duration
            title: Billing cadence
            type: string
          proRatingConfig:
            allOf:
            - $ref: '#/components/schemas/ProRatingConfig'
            description: Default pro-rating configuration for subscriptions using
              this plan.
            title: Pro-rating configuration
          creditConfig:
            allOf:
            - $ref: '#/components/schemas/CreditConfig'
            description: Default credit allowance configuration for subscriptions
              using this plan (first-class column).
            title: Credit configuration
          phases:
            description: |-
              The plan phase or pricing ramp allows changing a plan's rate cards over time as a subscription progresses.
              A phase switch occurs only at the end of a billing period, ensuring that a single subscription invoice will not include charges from different phase prices.
            items:
              $ref: '#/components/schemas/PlanPhase'
            minItems: 1
            type: array
        required:
        - billingCadence
        - currency
        - name
        - phases
      description: Plan input for custom subscription creation (without key and version).
    CustomSubscriptionChange:
      description: Change a custom subscription.
      properties:
        timing:
          allOf:
          - $ref: '#/components/schemas/SubscriptionTiming'
          description: |-
            Timing configuration for the change, when the change should take effect.
            For changing a subscription, the accepted values depend on the subscription configuration.
        billingAnchor:
          description: "The billing anchor of the subscription. The provided date\
            \ will be normalized according to the billing cadence to the nearest recurrence\
            \ before start time. If not provided, the previous subscription billing\
            \ anchor will be used."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        commercialOverrides:
          allOf:
          - $ref: '#/components/schemas/CommercialOverrides'
          description: Commercial terms for this subscription change.
        customPlan:
          allOf:
          - $ref: '#/components/schemas/CustomPlanInput'
          description: The custom plan description which defines the Subscription.
      required:
      - customPlan
      - timing
    CustomSubscriptionCreate:
      description: Create a custom subscription.
      properties:
        commercialOverrides:
          allOf:
          - $ref: '#/components/schemas/CommercialOverrides'
          description: Commercial terms for this subscription change.
        customPlan:
          allOf:
          - $ref: '#/components/schemas/CustomPlanInput'
          description: The custom plan description which defines the Subscription.
        timing:
          allOf:
          - $ref: '#/components/schemas/SubscriptionTiming'
          description: |-
            Timing configuration for the change, when the change should take effect.
            The default is immediate.
        customerId:
          description: The ID of the customer. Provide either the key or ID. Has presedence
            over the key.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
        customerKey:
          description: The key of the customer. Provide either the key or ID.
          maxLength: 256
          minLength: 1
          type: string
        billingAnchor:
          description: "The billing anchor of the subscription. The provided date\
            \ will be normalized according to the billing cadence to the nearest recurrence\
            \ before start time. If not provided, the subscription start time will\
            \ be used."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
      required:
      - customPlan
      title: Create custom
