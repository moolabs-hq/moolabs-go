    PlanSubscriptionChange:
      description: Change subscription based on plan.
      example:
        metadata: ""
        timing: ""
        startingPhase: startingPhase
        name: name
        billingAnchor: 2023-01-01T01:01:01.001Z
        description: description
        alignment: ""
        plan: ""
        commercialOverrides: ""
      properties:
        timing:
          allOf:
          - $ref: '#/components/schemas/SubscriptionTiming'
          description: |-
            Timing configuration for the change, when the change should take effect.
            For changing a subscription, the accepted values depend on the subscription configuration.
        alignment:
          allOf:
          - $ref: '#/components/schemas/Alignment'
          description: What alignment settings the subscription should have.
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Arbitrary metadata associated with the subscription.
        commercialOverrides:
          allOf:
          - $ref: '#/components/schemas/CommercialOverrides'
          description: Commercial terms for this subscription (replaces prior overrides
            when set on change).
        plan:
          allOf:
          - $ref: '#/components/schemas/PlanReferenceInput'
          description: The plan reference to change to.
        startingPhase:
          description: |-
            The key of the phase to start the subscription in.
            If not provided, the subscription will start in the first phase of the plan.
          minLength: 1
          type: string
        name:
          description: The name of the Subscription. If not provided the plan name
            is used.
          type: string
        description:
          description: Description for the Subscription.
          type: string
        billingAnchor:
          description: "The billing anchor of the subscription. The provided date\
            \ will be normalized according to the billing cadence to the nearest recurrence\
            \ before start time. If not provided, the previous subscription billing\
            \ anchor will be used."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
      required:
      - plan
      - timing
