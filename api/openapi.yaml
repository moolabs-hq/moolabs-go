        amount_micros: 0
      properties:
        reason:
          maxLength: 500
          title: Reason
          type: string
        amount_micros:
          description: Partial write-off amount; null = full
          title: Amount Micros
          type: integer
          nullable: true
      required:
      - reason
      title: CaseWriteOffRequest
    CashAppConfigUpdateRequest:
      example:
        fuzzy_match_tolerance_pct: 0.08008281904610115
        fuzzy_match_threshold: 0.6027456183070403
        exact_match_auto_apply: true
        multi_invoice_match_enabled: true
        max_auto_allocation_amount_micros: 0
      properties:
        fuzzy_match_tolerance_pct:
          description: Fuzzy match tolerance as decimal (e.g. 0.01 = ±1%)
          maximum: 1.0
          title: Fuzzy Match Tolerance Pct
          type: number
          nullable: true
        exact_match_auto_apply:
          title: Exact Match Auto Apply
          type: boolean
          nullable: true
        fuzzy_match_threshold:
          description: Confidence threshold for fuzzy name matching
          maximum: 1.0
          title: Fuzzy Match Threshold
          type: number
          nullable: true
        multi_invoice_match_enabled:
          title: Multi Invoice Match Enabled
          type: boolean
          nullable: true
        max_auto_allocation_amount_micros:
          minimum: 0.0
          title: Max Auto Allocation Amount Micros
          type: integer
          nullable: true
      title: CashAppConfigUpdateRequest
    ChannelPolicySchema:
      description: Per-channel rate limits and quiet hours.
      example:
        max_per_week: 12
        quiet_hours_start: 21:00
        quiet_hours_end: 08:00
      properties:
        max_per_week:
          default: 3
          maximum: 20.0
          minimum: 1.0
          title: Max Per Week
          type: integer
        quiet_hours_start:
          default: 21:00
          pattern: "^\\d{2}:\\d{2}$"
          title: Quiet Hours Start
          type: string
        quiet_hours_end:
          default: 08:00
          pattern: "^\\d{2}:\\d{2}$"
          title: Quiet Hours End
          type: string
      title: ChannelPolicySchema
