    BillingTaxIdentificationCode:
      description: TaxIdentificationCode is a normalized tax code shown on the original
        identity document.
      maxLength: 32
      minLength: 1
      type: string
    BillingWorkflow:
      description: BillingWorkflow represents the settings for a billing workflow.
      properties:
        collection:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowCollectionSettings'
          description: The collection settings for this workflow
        invoicing:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowInvoicingSettings'
          description: The invoicing settings for this workflow
        payment:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowPaymentSettings'
          description: The payment settings for this workflow
        tax:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowTaxSettings'
          description: The tax settings for this workflow
    BillingWorkflowCollectionAlignment:
      description: |-
        The alignment for collecting the pending line items into an invoice.

        Defaults to subscription, which means that we are to create a new invoice every time the
        a subscription period starts (for in advance items) or ends (for in arrears items).
      discriminator:
        mapping:
          subscription: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
          anchored: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentSubscription'
      - $ref: '#/components/schemas/BillingWorkflowCollectionAlignmentAnchored'
    BillingWorkflowCollectionAlignmentAnchored:
      description: |-
        BillingWorkflowCollectionAlignmentAnchored specifies the alignment for collecting the pending line items
        into an invoice.
      properties:
        type:
          description: The type of alignment.
          enum:
          - anchored
          type: string
        recurringPeriod:
          allOf:
          - $ref: '#/components/schemas/RecurringPeriodV2'
          description: The recurring period for the alignment.
      required:
      - recurringPeriod
      - type
    BillingWorkflowCollectionAlignmentSubscription:
      description: |-
        BillingWorkflowCollectionAlignmentSubscription specifies the alignment for collecting the pending line items
        into an invoice.
      properties:
        type:
          description: The type of alignment.
          enum:
          - subscription
          type: string
      required:
      - type
    BillingWorkflowCollectionSettings:
      description: Workflow collection specifies how to collect the pending line items
        for an invoice
      properties:
        alignment:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowCollectionAlignment'
          description: The alignment for collecting the pending line items into an
            invoice.
        interval:
          default: PT1H
          description: |-
            This grace period can be used to delay the collection of the pending line items specified in
            alignment.

            This is useful, in case of multiple subscriptions having slightly different billing periods.
          example: P1D
          format: ISO8601
          type: string
    BillingWorkflowCreate:
      description: Resource create operation model.
      properties:
        collection:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowCollectionSettings'
          description: The collection settings for this workflow
        invoicing:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowInvoicingSettings'
          description: The invoicing settings for this workflow
        payment:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowPaymentSettings'
          description: The payment settings for this workflow
        tax:
          allOf:
          - $ref: '#/components/schemas/BillingWorkflowTaxSettings'
          description: The tax settings for this workflow
    BillingWorkflowInvoicingSettings:
      description: BillingWorkflowInvoicingSettings represents the invoice settings
        for a billing workflow
      properties:
        autoAdvance:
          default: true
          description: Whether to automatically issue the invoice after the draftPeriod
            has passed.
          type: boolean
        draftPeriod:
          default: P0D
          description: The period for the invoice to be kept in draft status for manual
            reviews.
          example: P1D
          format: ISO8601
          type: string
        dueAfter:
          default: P30D
          description: |-
            The period after which the invoice is due.
            With some payment solutions it's only applicable for manual collection method.
          example: P30D
          format: ISO8601
          type: string
        progressiveBilling:
          default: false
          description: Should progressive billing be allowed for this workflow?
          type: boolean
        defaultTaxConfig:
          allOf:
          - $ref: '#/components/schemas/TaxConfig'
          description: Default tax configuration to apply to the invoices.
      title: Workflow invoice settings
    BillingWorkflowPaymentSettings:
      description: BillingWorkflowPaymentSettings represents the payment settings
        for a billing workflow
      properties:
        collectionMethod:
          allOf:
          - $ref: '#/components/schemas/CollectionMethod'
          description: The payment method for the invoice.
      title: Workflow payment settings
    BillingWorkflowTaxSettings:
      description: BillingWorkflowTaxSettings represents the tax settings for a billing
        workflow
      properties:
        enabled:
          default: true
          description: |-
            Enable automatic tax calculation when tax is supported by the app.
            For example, with Stripe Invoicing when enabled, tax is calculated via Stripe Tax.
          type: boolean
        enforced:
          default: false
          description: |-
            Enforce tax calculation when tax is supported by the app.
            When enabled, OpenMeter will not allow to create an invoice without tax calculation.
            Enforcement is different per apps, for example, Stripe app requires customer
            to have a tax location when starting a paid subscription.
          type: boolean
      title: Workflow tax settings
    CheckoutSessionCustomTextAfterSubmitParams:
      description: Stripe CheckoutSession.custom_text
      properties:
        afterSubmit:
          $ref: '#/components/schemas/CheckoutSessionCustomTextAfterSubmitParams_afterSubmit'
        shippingAddress:
          $ref: '#/components/schemas/CheckoutSessionCustomTextAfterSubmitParams_shippingAddress'
        submit:
          $ref: '#/components/schemas/CheckoutSessionCustomTextAfterSubmitParams_submit'
        termsOfServiceAcceptance:
          $ref: '#/components/schemas/CheckoutSessionCustomTextAfterSubmitParams_termsOfServiceAcceptance'
    CheckoutSessionUIMode:
      description: Stripe CheckoutSession.ui_mode
      enum:
      - embedded
      - hosted
      type: string
    ClientAppStartResponse:
      description: Response from the client app (OpenMeter backend) to start the OAuth2
        flow.
      example:
        url: url
      properties:
        url:
          description: The URL to start the OAuth2 authorization code grant flow.
          type: string
      required:
      - url
    CollectionMethod:
      description: CollectionMethod specifies how the invoice should be collected
        (automatic vs manual)
      enum:
      - charge_automatically
      - send_invoice
      title: Collection method
      type: string
    CommercialOverrides:
      description: Subscription-level commercial terms (persisted column; metadata
        fallback for legacy rows).
      properties:
        rateCardDiscount:
          $ref: '#/components/schemas/RateCardDiscount'
        creditOverride:
          $ref: '#/components/schemas/CreditOverride'
        entitlementOverrides:
          items:
            $ref: '#/components/schemas/EntitlementOverride'
          type: array
        overdraftSettings:
          $ref: '#/components/schemas/OverdraftSettings'
    ConflictProblemResponse:
      $ref: '#/components/schemas/UnexpectedProblemResponse'
    CountryCode:
      description: |-
        [ISO 3166-1](https://www.iso.org/iso-3166-country-codes.html) alpha-2 country code.
        Custom two-letter country codes are also supported for convenience.
      example: US
      maxLength: 2
      minLength: 2
      pattern: "^[A-Z]{2}$"
      type: string
    CreateCheckoutSessionTaxIdCollection:
      description: Create Stripe checkout session tax ID collection.
      properties:
        enabled:
          description: Enable tax ID collection during checkout. Defaults to false.
          type: boolean
        required:
          allOf:
          - $ref: '#/components/schemas/CreateCheckoutSessionTaxIdCollectionRequired'
          description: Describes whether a tax ID is required during checkout. Defaults
            to never.
      required:
      - enabled
    CreateCheckoutSessionTaxIdCollectionRequired:
      description: Create Stripe checkout session tax ID collection required.
      enum:
      - if_supported
      - never
      type: string
    CreateStripeCheckoutSessionBillingAddressCollection:
      description: Specify whether Checkout should collect the customer’s billing
        address.
      enum:
      - auto
      - required
      type: string
    CreateStripeCheckoutSessionConsentCollection:
      description: Configure fields for the Checkout Session to gather active consent
        from customers.
      properties:
        paymentMethodReuseAgreement:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionConsentCollectionPaymentMethodReuseAgreement'
          description: |-
            Determines the position and visibility of the payment method reuse agreement in the UI.
            When set to auto, Stripe’s defaults will be used. When set to hidden, the payment method reuse agreement text will always be hidden in the UI.
        promotions:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionConsentCollectionPromotions'
          description: |-
            If set to auto, enables the collection of customer consent for promotional communications.
            The Checkout Session will determine whether to display an option to opt into promotional
            communication from the merchant depending on the customer’s locale. Only available to US merchants.
        termsOfService:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionConsentCollectionTermsOfService'
          description: |-
            If set to required, it requires customers to check a terms of service checkbox before being able to pay.
            There must be a valid terms of service URL set in your Stripe Dashboard settings.
            https://dashboard.stripe.com/settings/public
    CreateStripeCheckoutSessionConsentCollectionPaymentMethodReuseAgreement:
      description: Create Stripe checkout session payment method reuse agreement.
      properties:
        position:
          $ref: '#/components/schemas/CreateStripeCheckoutSessionConsentCollectionPaymentMethodReuseAgreementPosition'
    CreateStripeCheckoutSessionConsentCollectionPaymentMethodReuseAgreementPosition:
      description: Create Stripe checkout session consent collection agreement position.
      enum:
      - auto
      - hidden
      type: string
    CreateStripeCheckoutSessionConsentCollectionPromotions:
      description: Create Stripe checkout session consent collection promotions.
      enum:
      - auto
      - none
      type: string
    CreateStripeCheckoutSessionConsentCollectionTermsOfService:
      description: Create Stripe checkout session consent collection terms of service.
      enum:
      - none
      - required
      type: string
    CreateStripeCheckoutSessionCustomerUpdate:
      description: Controls what fields on Customer can be updated by the Checkout
        Session.
      properties:
        address:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionCustomerUpdateBehavior'
          description: |-
            Describes whether Checkout saves the billing address onto customer.address.
            To always collect a full billing address, use billing_address_collection.
            Defaults to never.
        name:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionCustomerUpdateBehavior'
          description: |-
            Describes whether Checkout saves the name onto customer.name.
            Defaults to never.
        shipping:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionCustomerUpdateBehavior'
          description: |-
            Describes whether Checkout saves shipping information onto customer.shipping.
            To collect shipping information, use shipping_address_collection.
            Defaults to never.
    CreateStripeCheckoutSessionCustomerUpdateBehavior:
      description: Create Stripe checkout session customer update behavior.
      enum:
      - auto
      - never
      type: string
    CreateStripeCheckoutSessionRedirectOnCompletion:
      description: Create Stripe checkout session redirect on completion.
      enum:
      - always
      - if_required
      - never
      type: string
    CreateStripeCheckoutSessionRequest:
      description: Create Stripe checkout session request.
      example:
        customer:
          name: "ACME, Inc."
          currency: USD
          usageAttribution:
            subjectKeys:
            - my-identifier
        options:
          currency: USD
          successURL: http://example.com
          billingAddressCollection: required
          taxIdCollection:
            enabled: true
            required: if_supported
          customerUpdate:
            name: auto
            address: auto
      properties:
        appId:
          description: "If not provided, the default Stripe app is used if any."
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
        customer:
          $ref: '#/components/schemas/CreateStripeCheckoutSessionRequest_customer'
        stripeCustomerId:
          description: |-
            Stripe customer ID.
            If not provided OpenMeter creates a new Stripe customer or
            uses the OpenMeter customer's default Stripe customer ID.
          type: string
        options:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionRequestOptions'
          description: Options passed to Stripe when creating the checkout session.
      required:
      - customer
      - options
    CreateStripeCheckoutSessionRequestOptions:
      description: |-
        Create Stripe checkout session options
        See https://docs.stripe.com/api/checkout/sessions/create
      properties:
        billingAddressCollection:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionBillingAddressCollection'
          description: Specify whether Checkout should collect the customer’s billing
            address. Defaults to auto.
        cancelURL:
          description: |-
            If set, Checkout displays a back button and customers will be directed to this URL if they decide to cancel payment and return to your website.
            This parameter is not allowed if ui_mode is embedded.
          type: string
        clientReferenceID:
          description: "A unique string to reference the Checkout Session. This can\
            \ be a customer ID, a cart ID, or similar, and can be used to reconcile\
            \ the session with your internal systems."
          type: string
        customerUpdate:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionCustomerUpdate'
          description: Controls what fields on Customer can be updated by the Checkout
            Session.
        consentCollection:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionConsentCollection'
          description: Configure fields for the Checkout Session to gather active
            consent from customers.
        currency:
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          description: "Three-letter ISO currency code, in lowercase."
        customText:
          allOf:
          - $ref: '#/components/schemas/CheckoutSessionCustomTextAfterSubmitParams'
          description: Display additional text for your customers using custom text.
        expiresAt:
          description: |-
            The Epoch time in seconds at which the Checkout Session will expire.
            It can be anywhere from 30 minutes to 24 hours after Checkout Session creation. By default, this value is 24 hours from creation.
          format: int64
          type: integer
        locale:
          type: string
        metadata:
          additionalProperties:
            type: string
          description: |-
            Set of key-value pairs that you can attach to an object.
            This can be useful for storing additional information about the object in a structured format.
            Individual keys can be unset by posting an empty value to them.
            All keys can be unset by posting an empty value to metadata.
        returnURL:
          description: |-
            The URL to redirect your customer back to after they authenticate or cancel their payment on the payment method’s app or site.
            This parameter is required if ui_mode is embedded and redirect-based payment methods are enabled on the session.
          type: string
        successURL:
          description: |-
            The URL to which Stripe should send customers when payment or setup is complete.
            This parameter is not allowed if ui_mode is embedded.
            If you’d like to use information from the successful Checkout Session on your page, read the guide on customizing your success page:
            https://docs.stripe.com/payments/checkout/custom-success-page
          type: string
        uiMode:
          allOf:
          - $ref: '#/components/schemas/CheckoutSessionUIMode'
          description: The UI mode of the Session. Defaults to hosted.
        paymentMethodTypes:
          description: "A list of the types of payment methods (e.g., card) this Checkout\
            \ Session can accept."
          items:
            type: string
          type: array
        redirectOnCompletion:
          allOf:
          - $ref: '#/components/schemas/CreateStripeCheckoutSessionRedirectOnCompletion'
          description: |-
            This parameter applies to ui_mode: embedded. Defaults to always.
            Learn more about the redirect behavior of embedded sessions at
            https://docs.stripe.com/payments/checkout/custom-success-page?payment-ui=embedded-form
        taxIdCollection:
          allOf:
          - $ref: '#/components/schemas/CreateCheckoutSessionTaxIdCollection'
          description: Controls tax ID collection during checkout.
    CreateStripeCheckoutSessionResult:
      description: Create Stripe Checkout Session response.
      example:
        metadata:
          key: metadata
        successURL: successURL
        sessionId: sessionId
        clientReferenceId: clientReferenceId
        expiresAt: 2023-01-01T01:01:01.001Z
        url: url
        mode: ""
        createdAt: 2023-01-01T01:01:01.001Z
        cancelURL: cancelURL
        customerEmail: customerEmail
        customerId: 01G65Z755AFWAKHE12NY0CQ9FH
        setupIntentId: setupIntentId
        clientSecret: clientSecret
        currency: ""
        stripeCustomerId: stripeCustomerId
        returnURL: returnURL
        status: status
      properties:
        customerId:
          description: The OpenMeter customer ID.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
        stripeCustomerId:
          description: The Stripe customer ID.
          type: string
        sessionId:
          description: The checkout session ID.
          type: string
        setupIntentId:
          description: The checkout session setup intent ID.
          type: string
        clientSecret:
          description: |-
            The client secret of the checkout session.
            This can be used to initialize Stripe.js for your client-side implementation.
          type: string
        clientReferenceId:
          description: |-
            A unique string to reference the Checkout Session.
            This can be a customer ID, a cart ID, or similar, and can be used to reconcile the session with your internal systems.
          type: string
        customerEmail:
          description: Customer's email address provided to Stripe.
          type: string
        currency:
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          description: "Three-letter ISO currency code, in lowercase."
        createdAt:
          description: Timestamp at which the checkout session was created.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        expiresAt:
          description: Timestamp at which the checkout session will expire.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        metadata:
          additionalProperties:
            type: string
          description: Set of key-value pairs attached to the checkout session.
        status:
          description: The status of the checkout session.
          type: string
        url:
          description: URL to show the checkout session.
          type: string
        mode:
          allOf:
          - $ref: '#/components/schemas/StripeCheckoutSessionMode'
          description: |-
            Mode
            Always `setup` for now.
        cancelURL:
          description: Cancel URL.
          type: string
        successURL:
          description: Success URL.
          type: string
        returnURL:
          description: Return URL.
          type: string
      required:
      - createdAt
      - customerId
      - mode
      - sessionId
      - setupIntentId
      - stripeCustomerId
    CreateStripeCustomerPortalSessionParams:
      description: Stripe customer portal request params.
      example:
        configurationId: configurationId
        locale: locale
        returnUrl: returnUrl
      properties:
        configurationId:
          description: |-
            The ID of an existing configuration to use for this session,
            describing its functionality and features.
            If not specified, the session uses the default configuration.

            See https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-configuration
          title: Configuration
          type: string
        locale:
          description: |-
            The IETF language tag of the locale customer portal is displayed in.
            If blank or auto, the customer’s preferred_locales or browser’s locale is used.

            See: https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-locale
          title: Locale
          type: string
        returnUrl:
          description: |-
            The URL to redirect the customer to after they have completed
            their requested actions.

            See: https://docs.stripe.com/api/customer_portal/sessions/create#create_portal_session-return_url
          title: ReturnUrl
          type: string
    CreditConfig:
      description: Plan-level defaults for subscription credit allowances (persisted
        as first-class column).
      properties:
        enabled:
          type: boolean
        globalPoolEnabled:
          type: boolean
        featurePoolsEnabled:
          type: boolean
        initialAmount:
          format: double
          type: number
        recurringAmount:
          format: double
          type: number
        cadence:
          description: "Billing cadence key for credit allowance (e.g. MONTHLY), aligned\
            \ with plan usage."
          type: string
        expiresInDays:
          type: integer
        rolloverEnabled:
          type: boolean
        rolloverPercent:
          format: double
          type: number
        rolloverCapAmount:
          format: double
          type: number
        rolloverExpiresAfterDays:
          type: integer
        rolloverPriorityDelta:
          type: integer
        featurePools:
          items:
            $ref: '#/components/schemas/FeaturePool'
          type: array
      required:
      - cadence
      - enabled
      - expiresInDays
      - featurePoolsEnabled
      - globalPoolEnabled
      - initialAmount
      - recurringAmount
      - rolloverEnabled
    CreditNoteOriginalInvoiceRef:
      allOf:
      - $ref: '#/components/schemas/InvoiceGenericDocumentRef'
      description: CreditNoteOriginalInvoiceRef is used to reference the original
        invoice that a credit note is based on.
      properties:
        type:
          description: Type of the invoice.
          enum:
          - credit_note_original_invoice
        issuedAt:
          description: IssueAt reflects the time the document was issued.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
        number:
          allOf:
          - $ref: '#/components/schemas/InvoiceNumber'
          description: (Serial) Number of the referenced document.
          readOnly: true
        url:
          description: Link to the source document.
          format: uri
          readOnly: true
      required:
      - type
      - url
    CreditOverride:
      description: Adjusts credit pool amounts; keys are feature keys or "__global__"
        for the global pool.
      properties:
        poolOverrides:
          additionalProperties:
            format: double
            type: number
      required:
      - poolOverrides
    Currency:
      description: Currency describes a currency supported by OpenMeter.
      example:
        subunits: 0
        symbol: symbol
        code: ""
        name: name
      properties:
        code:
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          description: The currency ISO code.
        name:
          description: The currency name.
          type: string
        symbol:
          description: The currency symbol.
          type: string
        subunits:
          description: Subunit of the currency.
          format: uint32
          type: integer
      required:
      - code
      - name
      - subunits
      - symbol
    CurrencyCode:
      description: |-
        Three-letter [ISO4217](https://www.iso.org/iso-4217-currency-codes.html) currency code.
        Custom three-letter currency codes are also supported for convenience.
      example: USD
      maxLength: 3
      minLength: 3
      pattern: "^[A-Z]{3}$"
      type: string
    CustomInvoicingApp:
      description: |-
        Custom Invoicing app can be used for interface with any invoicing or payment system.

        This app provides ways to manipulate invoices and payments, however the integration
        must rely on Notifications API to get notified about invoice changes.
      properties:
        id:
          description: A unique identifier for the resource.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          readOnly: true
          title: ID
          type: string
        name:
          description: Human-readable name for the resource. Between 1 and 256 characters.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        createdAt:
          description: Timestamp of when the resource was created.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Creation Time
          type: string
        updatedAt:
          description: Timestamp of when the resource was last updated.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Last Update Time
          type: string
        deletedAt:
          description: Timestamp of when the resource was permanently deleted.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Deletion Time
          type: string
        listing:
          allOf:
          - $ref: '#/components/schemas/MarketplaceListing'
          description: The marketplace listing that this installed app is based on.
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/AppStatus'
          description: Status of the app connection.
          readOnly: true
        type:
          description: The app's type is CustomInvoicing.
          enum:
          - custom_invoicing
          type: string
        enableDraftSyncHook:
          description: |-
            Enable draft.sync hook.

            If the hook is not enabled, the invoice will be progressed to the next state automatically.
          type: boolean
        enableIssuingSyncHook:
          description: |-
            Enable issuing.sync hook.

            If the hook is not enabled, the invoice will be progressed to the next state automatically.
          type: boolean
      required:
      - createdAt
      - enableDraftSyncHook
      - enableIssuingSyncHook
      - id
      - listing
      - name
      - status
      - type
      - updatedAt
    CustomInvoicingAppReplaceUpdate:
      description: Resource update operation model.
      properties:
        name:
          description: Human-readable name for the resource. Between 1 and 256 characters.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        type:
          description: The app's type is CustomInvoicing.
          enum:
          - custom_invoicing
          type: string
        enableDraftSyncHook:
          description: |-
            Enable draft.sync hook.

            If the hook is not enabled, the invoice will be progressed to the next state automatically.
          type: boolean
        enableIssuingSyncHook:
          description: |-
            Enable issuing.sync hook.

            If the hook is not enabled, the invoice will be progressed to the next state automatically.
          type: boolean
      required:
      - enableDraftSyncHook
      - enableIssuingSyncHook
      - name
      - type
    CustomInvoicingCustomerAppData:
      description: Custom Invoicing Customer App Data.
      properties:
        app:
          allOf:
          - $ref: '#/components/schemas/CustomInvoicingApp'
          description: The installed custom invoicing app this data belongs to.
          readOnly: true
        id:
          description: |-
            The app ID.
            If not provided, it will use the global default for the app type.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          title: App ID
          type: string
        type:
          description: The app name.
          enum:
          - custom_invoicing
          title: App Type
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Metadata to be used by the custom invoicing provider.
      required:
      - type
    CustomInvoicingDraftSynchronizedRequest:
      description: Information to finalize the draft details of an invoice.
      example:
        invoicing: ""
      properties:
        invoicing:
          allOf:
          - $ref: '#/components/schemas/CustomInvoicingSyncResult'
          description: The result of the synchronization.
    CustomInvoicingFinalizedInvoicingRequest:
      description: Information to finalize the invoicing details of an invoice.
      properties:
        invoiceNumber:
          allOf:
          - $ref: '#/components/schemas/InvoiceNumber'
          description: If set the invoice's number will be set to this value.
        sentToCustomerAt:
          description: If set the invoice's sent to customer at will be set to this
            value.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
    CustomInvoicingFinalizedPaymentRequest:
      description: Information to finalize the payment details of an invoice.
      properties:
        externalId:
          description: If set the invoice's payment external ID will be set to this
            value.
          type: string
    CustomInvoicingFinalizedRequest:
      description: |-
        Information to finalize the invoice.

        If invoicing.invoiceNumber is not set, then a new invoice number will be generated (INV- prefix).
      example:
        invoicing: ""
        payment: ""
      properties:
        invoicing:
          allOf:
          - $ref: '#/components/schemas/CustomInvoicingFinalizedInvoicingRequest'
          description: The result of the synchronization.
        payment:
          allOf:
          - $ref: '#/components/schemas/CustomInvoicingFinalizedPaymentRequest'
          description: The result of the payment synchronization.
    CustomInvoicingLineDiscountExternalIdMapping:
      description: Mapping between line discounts and external IDs.
      properties:
        lineDiscountId:
          description: The line discount ID.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
        externalId:
          description: The external ID (e.g. custom invoicing system's ID).
          type: string
      required:
      - externalId
      - lineDiscountId
    CustomInvoicingLineExternalIdMapping:
      description: Mapping between lines and external IDs.
      properties:
        lineId:
          description: The line ID.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
        externalId:
          description: The external ID (e.g. custom invoicing system's ID).
          type: string
      required:
      - externalId
      - lineId
    CustomInvoicingPaymentTrigger:
      description: Payment trigger to execute on a finalized invoice.
      enum:
      - paid
      - payment_failed
      - payment_uncollectible
      - payment_overdue
      - action_required
      - void
      type: string
    CustomInvoicingSyncResult:
      description: |-
        Information to synchronize the invoice.

        Can be used to store external app's IDs on the invoice or lines.
      properties:
        invoiceNumber:
          allOf:
          - $ref: '#/components/schemas/InvoiceNumber'
          description: If set the invoice's number will be set to this value.
        externalId:
          description: If set the invoice's invoicing external ID will be set to this
            value.
          type: string
        lineExternalIds:
          description: |-
            If set the invoice's line external IDs will be set to this value.

            This can be used to reference the external system's entities in the
            invoice.
          items:
            $ref: '#/components/schemas/CustomInvoicingLineExternalIdMapping'
          type: array
        lineDiscountExternalIds:
          description: |-
            If set the invoice's line discount external IDs will be set to this value.

            This can be used to reference the external system's entities in the
            invoice.
          items:
            $ref: '#/components/schemas/CustomInvoicingLineDiscountExternalIdMapping'
          type: array
    CustomInvoicingTaxConfig:
