        in the invoice when voiding.
      discriminator:
        mapping:
          discard: '#/components/schemas/VoidInvoiceLineDiscardAction'
          pending: '#/components/schemas/VoidInvoiceLinePendingActionCreate'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/VoidInvoiceLineDiscardAction'
      - $ref: '#/components/schemas/VoidInvoiceLinePendingActionCreate'
    VoidInvoiceLineActionCreateItem:
      description: VoidInvoiceLineAction describes how to handle a specific line item
        in the invoice when voiding.
      discriminator:
        mapping:
          discard: '#/components/schemas/VoidInvoiceLineDiscardAction'
          pending: '#/components/schemas/VoidInvoiceLinePendingActionCreateItem'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/VoidInvoiceLineDiscardAction'
      - $ref: '#/components/schemas/VoidInvoiceLinePendingActionCreateItem'
    VoidInvoiceLineActionType:
      description: VoidInvoiceLineActionType describes how to handle the voidied line
        item in the invoice.
      enum:
      - discard
      - pending
      type: string
    VoidInvoiceLineDiscardAction:
      description: VoidInvoiceLineDiscardAction describes how to handle the voidied
        line item in the invoice.
      properties:
        type:
          description: The action to take on the line item.
          enum:
          - discard
          type: string
      required:
      - type
    VoidInvoiceLinePendingActionCreate:
      description: VoidInvoiceLinePendingAction describes how to handle the voidied
        line item in the invoice.
      properties:
        type:
          description: The action to take on the line item.
          enum:
          - pending
          type: string
        nextInvoiceAt:
          description: |-
            The time at which the line item should be invoiced again.

            If not provided, the line item will be re-invoiced now.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
      required:
      - type
    VoidInvoiceLinePendingActionCreateItem:
      description: VoidInvoiceLinePendingAction describes how to handle the voidied
        line item in the invoice.
      properties:
        type:
          description: The action to take on the line item.
          enum:
          - pending
          type: string
        nextInvoiceAt:
          description: |-
            The time at which the line item should be invoiced again.

            If not provided, the line item will be re-invoiced now.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
      required:
      - type
    WindowSize:
      description: Aggregation window size.
      enum:
      - MINUTE
      - HOUR
      - DAY
      - MONTH
      type: string
      x-enum-varnames:
      - Minute
      - Hour
      - Day
      - Month
    WindowedBalanceHistory:
      description: The windowed balance history.
      example:
        burndownHistory:
        - grantBalancesAtStart:
            "01G65Z755AFWAKHE12NY0CQ9FH": 100
          period: ""
          balanceAtStart: 100
          grantUsages:
          - grantId: 01G65Z755AFWAKHE12NY0CQ9FH
            usage: 100
          - grantId: 01G65Z755AFWAKHE12NY0CQ9FH
            usage: 100
          usage: 100
          grantBalancesAtEnd:
            "01G65Z755AFWAKHE12NY0CQ9FH": 100
          balanceAtEnd: 100
          overage: 100
        - grantBalancesAtStart:
            "01G65Z755AFWAKHE12NY0CQ9FH": 100
          period: ""
          balanceAtStart: 100
          grantUsages:
          - grantId: 01G65Z755AFWAKHE12NY0CQ9FH
            usage: 100
          - grantId: 01G65Z755AFWAKHE12NY0CQ9FH
            usage: 100
          usage: 100
          grantBalancesAtEnd:
            "01G65Z755AFWAKHE12NY0CQ9FH": 100
          balanceAtEnd: 100
          overage: 100
        windowedHistory:
        - period:
            from: 2023-01-01T01:01:01.001Z
            to: 2023-02-01T01:01:01.001Z
          balanceAtStart: 100
          usage: 100
        - period:
            from: 2023-01-01T01:01:01.001Z
            to: 2023-02-01T01:01:01.001Z
          balanceAtStart: 100
          usage: 100
      properties:
        windowedHistory:
          description: |-
            The windowed balance history.
            - It only returns rows for windows where there was usage.
            - The windows are inclusive at their start and exclusive at their end.
            - The last window may be smaller than the window size and is inclusive at both ends.
          items:
            $ref: '#/components/schemas/BalanceHistoryWindow'
          type: array
        burndownHistory:
          description: Grant burndown history.
          items:
            $ref: '#/components/schemas/GrantBurnDownHistorySegment'
          type: array
      required:
      - burndownHistory
      - windowedHistory
