  schemas:
    AllocateCreditsRequest:
      description: Request to allocate credits from source to target wallet.
      example:
        subject_id: subject_id
        target_wallet_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        reason: reason
        source_wallet_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        amount_micros: 0
      properties:
        source_wallet_id:
          format: uuid
          title: Source Wallet Id
          type: string
        target_wallet_id:
          format: uuid
          title: Target Wallet Id
          type: string
        amount_micros:
          description: Amount in micros to transfer
          title: Amount Micros
          type: integer
        subject_id:
          description: Subject performing the allocation (for audit)
          title: Subject Id
          type: string
        reason:
          nullable: true
          type: string
      required:
      - amount_micros
      - source_wallet_id
      - subject_id
      - target_wallet_id
      title: AllocateCreditsRequest
    AutoTopupActivityItem:
      description: Single auto-topup activity item.
      example:
        rule_id: 046b6c7f-0b8a-43b9-b35d-6489e6daee91
        error_message: error_message
        topup_amount_micros: 6
