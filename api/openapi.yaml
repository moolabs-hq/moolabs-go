          type: string
        featureKey:
          description: The feature the subject is entitled to use.
          example: example-feature-key
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          type: string
        featureId:
          description: The feature the subject is entitled to use.
