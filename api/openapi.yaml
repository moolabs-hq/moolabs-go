    EntitlementValue:
      description: "Entitlements are the core of OpenMeter access management. They\
        \ define access to features for subjects. Entitlements can be metered, boolean,\
        \ or static."
      example:
        balance: 100
        hasAccess: true
        usage: 50
        totalAvailableGrantAmount: 100
        config: "{ key: \"value\" }"
        overage: 0
      properties:
        hasAccess:
          description: Whether the subject has access to the feature. Shared accross
            all entitlement types.
          example: true
          readOnly: true
          type: boolean
        balance:
          description: "Only available for metered entitlements. Metered entitlements\
            \ are built around a balance calculation where feature usage is deducted\
            \ from the issued grants. Balance represents the remaining balance of\
            \ the entitlement, it's value never turns negative."
          example: 100
          format: double
          readOnly: true
          type: number
        usage:
          description: Only available for metered entitlements. Returns the total
            feature usage in the current period.
          example: 50
          format: double
          readOnly: true
          type: number
        overage:
          description: "Only available for metered entitlements. Overage represents\
            \ the usage that wasn't covered by grants, e.g. if the subject had a total\
            \ feature usage of 100 in the period but they were only granted 80, there\
            \ would be 20 overage."
          example: 0
          format: double
          readOnly: true
          type: number
        totalAvailableGrantAmount:
          description: The summed value of all grant amounts that are active at the
            time of the query.
          example: 100
          format: double
          readOnly: true
          type: number
        config:
          description: Only available for static entitlements. The JSON parsable config
            of the entitlement.
          example: "{ key: \"value\" }"
          readOnly: true
          type: string
      required:
      - hasAccess
