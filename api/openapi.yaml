    BillingDiscountPercentage:
      description: A percentage discount.
      properties:
        percentage:
          allOf:
          - $ref: '#/components/schemas/Percentage'
          description: The percentage of the discount.
          maximum: 100
          minimum: 0
          title: Percentage
        correlationId:
          description: |-
            Correlation ID for the discount.

            This is used to link discounts across different invoices (progressive billing use case).

            If not provided, the invoicing engine will auto-generate one. When editing an invoice line,
            please make sure to keep the same correlation ID of the discount or in progressive billing
            setups the discount amounts might be incorrect.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
      required:
      - percentage
    BillingDiscountReason:
      description: The reason for the discount.
      discriminator:
        mapping:
          maximum_spend: '#/components/schemas/DiscountReasonMaximumSpend'
          ratecard_percentage: '#/components/schemas/DiscountReasonRatecardPercentage'
          ratecard_usage: '#/components/schemas/DiscountReasonRatecardUsage'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/DiscountReasonMaximumSpend'
      - $ref: '#/components/schemas/DiscountReasonRatecardPercentage'
      - $ref: '#/components/schemas/DiscountReasonRatecardUsage'
    BillingDiscountUsage:
      description: A usage discount.
      properties:
        quantity:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: |-
            The quantity of the usage discount.

            Must be positive.
          title: Usage
        correlationId:
          description: |-
            Correlation ID for the discount.

            This is used to link discounts across different invoices (progressive billing use case).

            If not provided, the invoicing engine will auto-generate one. When editing an invoice line,
            please make sure to keep the same correlation ID of the discount or in progressive billing
            setups the discount amounts might be incorrect.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
      required:
      - quantity
    BillingDiscounts:
      description: A discount by type.
      properties:
        percentage:
          allOf:
          - $ref: '#/components/schemas/BillingDiscountPercentage'
          description: The percentage discount.
        usage:
          allOf:
          - $ref: '#/components/schemas/BillingDiscountUsage'
          description: The usage discount.
    BillingInvoiceCustomerExtendedDetails:
      description: |-
        BillingInvoiceCustomerExtendedDetails is a collection of fields that are used to extend the billing party details for invoices.

        These fields contain the OpenMeter specific details for the customer, that are not strictly required for the invoice itself.
      properties:
        id:
          description: Unique identifier for the party (if available)
          readOnly: true
          type: string
        key:
          description: An optional unique key of the party (if available)
          maxLength: 256
          minLength: 1
          title: Key
          type: string
        name:
          description: Legal name or representation of the organization.
          type: string
        taxId:
          allOf:
          - $ref: '#/components/schemas/BillingPartyTaxIdentity'
          description: |-
            The entity's legal ID code used for tax purposes. They may have
            other numbers, but we're only interested in those valid for tax purposes.
        addresses:
          description: Regular post addresses for where information should be sent
            if needed.
          items:
            $ref: '#/components/schemas/Address'
          maxItems: 1
          type: array
        usageAttribution:
          allOf:
          - $ref: '#/components/schemas/CustomerUsageAttribution'
          description: Mapping to attribute metered usage to the customer
