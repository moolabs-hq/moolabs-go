  /v1/arc/admin/communications/{communication_id}/reclassify:
    post:
      description: |-
        Force the classifier to re-run on a stored communication.

        Used by the (future) learning-loop UI to bulk-reclassify after a
        pattern correction.  Dedupes by ``inbound_classify:<comm_id>`` so
        the row is queued at most once per comm — re-posting is safe.

        Tenant-scoped: looks up the comm by ``(id, tenant_id)`` so an
        operator authenticated against tenant A cannot force a reclassify
        on tenant B's inbound email.  Missing comm — or comm belonging to
        a different tenant — returns 404 without distinguishing the two.
      operationId: reclassifyCommunication
      parameters:
      - explode: false
        in: path
        name: communication_id
        required: true
        schema:
          format: uuid
          title: Communication Id
          type: string
        style: simple
      - explode: false
        in: header
        name: X-API-Key
        required: true
        schema:
          title: X-Api-Key
          type: string
        style: simple
      - explode: false
        in: header
        name: X-Tenant-Id
        required: false
        schema:
          title: X-Tenant-Id
          type: string
          nullable: true
        style: simple
      - explode: false
        in: header
        name: X-Org-Id
        required: false
        schema:
          title: X-Org-Id
          type: string
          nullable: true
        style: simple
      responses:
        "202":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArcHTTPValidationError'
          description: Validation Error
      summary: Re-enqueue inbound classification for an existing communication
      tags:
      - ArcAdmin
  /v1/arc/admin/inbound-routing/backfill-malformed-disputes:
    post:
      description: |-
        Find AI-classified disputes that landed on $0 amount or fully-paid
        invoices, soft-resolve them, and re-feed the source comm into the
        (now-fixed) router so it produces a PROPOSED dispute + operator
        approval task.

        Tenant scope: strictly the tenant resolved by ``get_tenant_id``
        from the X-API-Key header.  Operators running cleanup across
        multiple tenants must rotate keys; the body cannot override the
        auth-gated tenant.  (An earlier draft accepted ``body.tenant_id``,
        which let any tenant-scoped key write against another tenant.)

        Defensive on real-run rerouting: if the rerun raises (LLM
        unavailable, anchor resolution exception, etc.) the soft-mark on
        the broken dispute STAYS — the operator can reclassify the source
        comm manually via ``POST /admin/communications/{id}/reclassify``.
      operationId: backfillMalformedDisputesV1ArcAdmin
      parameters:
      - explode: false
        in: header
        name: X-API-Key
        required: true
        schema:
          title: X-Api-Key
          type: string
        style: simple
      - explode: false
        in: header
        name: X-Tenant-Id
        required: false
        schema:
          title: X-Tenant-Id
          type: string
          nullable: true
        style: simple
      - explode: false
        in: header
        name: X-Org-Id
        required: false
        schema:
          title: X-Org-Id
          type: string
          nullable: true
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BackfillMalformedDisputesRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackfillMalformedDisputesResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArcHTTPValidationError'
          description: Validation Error
      summary: Repair AI-classified disputes the pre-T4 router mis-routed
      tags:
      - ArcAdmin
