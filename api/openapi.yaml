        Sync a newly-created subscription to the mirror and create initial credit grants.

        Must be called immediately after subscription creation in OpenMeter so that:
        1. The subscription appears in subscriptions_mirror (needed for billing/rating).
        2. Initial credit grants are created from the plan's creditConfig.
        3. Any per-pool recurring overrides (pool_overrides) are applied before minting grants.
