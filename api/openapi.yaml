        At least one price component is required in each tier.
      properties:
        upToAmount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: |-
            Up to and including to this quantity will be contained in the tier.
            If null, the tier is open-ended.
          title: Up to quantity
        flatPrice:
          allOf:
          - $ref: '#/components/schemas/FlatPrice'
          description: The flat price component of the tier.
          title: Flat price component
          nullable: true
        unitPrice:
          allOf:
          - $ref: '#/components/schemas/UnitPrice'
          description: The unit price component of the tier.
          title: Unit price component
          nullable: true
      required:
      - flatPrice
      - unitPrice
    PriceType:
      description: The type of the price.
      enum:
      - flat
      - unit
      - tiered
      - dynamic
      - package
      type: string
    ProRatingConfig:
      description: Configuration for pro-rating behavior.
      properties:
        enabled:
          default: true
          description: Whether pro-rating is enabled for this plan.
          title: Enable pro-rating
          type: boolean
        mode:
          allOf:
          - $ref: '#/components/schemas/ProRatingMode'
          description: How to handle pro-rating for billing period changes.
          title: Pro-rating mode
      required:
      - enabled
      - mode
    ProRatingMode:
      description: Pro-rating mode options for handling billing period changes.
      enum:
      - prorate_prices
      type: string
    Progress:
      description: Progress describes a progress of a task.
      example:
        total: 1
        success: 0
        failed: 6
        updatedAt: 2023-01-01T01:01:01.001Z
      properties:
        success:
          description: Success is the number of items that succeeded
          format: uint64
          type: integer
        failed:
          description: Failed is the number of items that failed
          format: uint64
          type: integer
        total:
          description: The total number of items to process
          format: uint64
          type: integer
        updatedAt:
          description: The time the progress was last updated
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
      required:
      - failed
      - success
      - total
      - updatedAt
    RateCard:
      description: A rate card defines the pricing and entitlement of a feature or
        service.
      discriminator:
        mapping:
          flat_fee: '#/components/schemas/RateCardFlatFee'
          usage_based: '#/components/schemas/RateCardUsageBased'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/RateCardFlatFee'
      - $ref: '#/components/schemas/RateCardUsageBased'
    RateCardBooleanEntitlement:
      description: Entitlement template of a boolean entitlement.
      properties:
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the feature.
        type:
          enum:
          - boolean
          type: string
      required:
      - type
    RateCardDiscount:
      description: Discount on rate card pricing in basis points (e.g. 1500 = 15%).
      properties:
        discountBps:
          type: integer
      required:
      - discountBps
    RateCardEntitlement:
      description: |-
        Entitlement templates are used to define the entitlements of a plan.
        Features are omitted from the entitlement template, as they are defined in the rate card.
      discriminator:
        mapping:
          metered: '#/components/schemas/RateCardMeteredEntitlement'
          static: '#/components/schemas/RateCardStaticEntitlement'
          boolean: '#/components/schemas/RateCardBooleanEntitlement'
        propertyName: type
      oneOf:
      - $ref: '#/components/schemas/RateCardMeteredEntitlement'
      - $ref: '#/components/schemas/RateCardStaticEntitlement'
      - $ref: '#/components/schemas/RateCardBooleanEntitlement'
    RateCardFlatFee:
      description: A flat fee rate card defines a one-time purchase or a recurring
        fee.
      example:
        entitlementTemplate: ""
        metadata: "{}"
        discounts: ""
        price:
          type: flat
          amount: "100"
          paymentTerm: in_arrears
        name: name
        description: description
        taxConfig: ""
        type: flat_fee
        billingCadence: billingCadence
        featureKey: featureKey
        key: key
      properties:
        type:
          description: The type of the RateCard.
          enum:
          - flat_fee
          title: RateCard type
          type: string
        key:
          description: A semi-unique identifier for the resource.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          title: Key
          type: string
        name:
          description: Human-readable name for the resource. Between 1 and 256 characters.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        featureKey:
          description: The feature the customer is entitled to use.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          title: Feature key
          type: string
        entitlementTemplate:
          allOf:
          - $ref: '#/components/schemas/RateCardEntitlement'
          description: |-
            The entitlement of the rate card.
            Only available when featureKey is set.
        taxConfig:
          allOf:
          - $ref: '#/components/schemas/TaxConfig'
          description: |-
            The tax config of the rate card.
            When undefined, the tax config of the feature or the default tax config of the plan is used.
          title: Tax config
        billingCadence:
          description: |-
            The billing cadence of the rate card.
            When null it means it is a one time fee.
          format: duration
          title: Billing cadence
          type: string
          nullable: true
        price:
          allOf:
          - $ref: '#/components/schemas/FlatPriceWithPaymentTerm'
          description: |-
            The price of the rate card.
            When null, the feature or service is free.
          example:
            type: flat
            amount: "100"
            paymentTerm: in_arrears
          title: Price
          nullable: true
        discounts:
          allOf:
          - $ref: '#/components/schemas/Discounts'
          description: |-
            The discount of the rate card. For flat fee rate cards only percentage discounts are supported.
            Only available when price is set.
          title: Discounts
      required:
      - billingCadence
      - key
      - name
      - price
      - type
    RateCardMeteredEntitlement:
      description: The entitlement template with a metered entitlement.
      properties:
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the feature.
        type:
          enum:
          - metered
          type: string
        isSoftLimit:
          default: false
          description: "If softLimit=true the subject can use the feature even if\
            \ the entitlement is exhausted, hasAccess will always be true."
          title: Soft limit
          type: boolean
        issueAfterReset:
          description: |-
            You can grant usage automatically alongside the entitlement, the example scenario would be creating a starting balance.
            If an amount is specified here, a grant will be created alongside the entitlement with the specified amount.
            That grant will have it's rollover settings configured in a way that after each reset operation, the balance will return the original amount specified here.
            Manually creating such a grant would mean having the "amount", "minRolloverAmount", and "maxRolloverAmount" fields all be the same.
          format: double
          minimum: 0
          title: Initial grant amount
          type: number
        issueAfterResetPriority:
          default: 1
          description: Defines the grant priority for the default grant.
          format: uint8
          maximum: 255
          minimum: 1
          title: Issue grant after reset priority
          type: integer
        preserveOverageAtReset:
          default: false
          description: "If true, the overage is preserved at reset. If false, the\
            \ usage is reset to 0."
          title: Preserve overage at reset
          type: boolean
        usagePeriod:
          description: |-
            The interval of the metered entitlement.
            Defaults to the billing cadence of the rate card.
          format: duration
          title: Usage Period
          type: string
      required:
      - type
    RateCardStaticEntitlement:
      description: Entitlement template of a static entitlement.
      properties:
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the feature.
        type:
          enum:
          - static
          type: string
        config:
          description: "The JSON parsable config of the entitlement. This value is\
            \ also returned when checking entitlement access and it is useful for\
            \ configuring fine-grained access settings to the feature, implemented\
            \ in your own system. Has to be an object."
          example: "{ \"integrations\": [\"github\"] }"
          format: json
          type: string
      required:
      - config
      - type
    RateCardType:
      description: The type of the rate card.
      enum:
      - flat_fee
      - usage_based
      type: string
    RateCardUsageBased:
      description: A usage-based rate card defines a price based on usage.
      properties:
        type:
          description: The type of the RateCard.
          enum:
          - usage_based
          title: RateCard type
          type: string
        key:
          description: A semi-unique identifier for the resource.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          title: Key
          type: string
        name:
          description: Human-readable name for the resource. Between 1 and 256 characters.
          maxLength: 256
          minLength: 1
          title: Display name
          type: string
        description:
          description: Optional description of the resource. Maximum 1024 characters.
          maxLength: 1024
          title: Description
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the resource.
          title: Metadata
          nullable: true
        featureKey:
          description: The feature the customer is entitled to use.
          maxLength: 64
          minLength: 1
          pattern: "^[a-z0-9]+(?:_[a-z0-9]+)*$"
          title: Feature key
          type: string
        entitlementTemplate:
          allOf:
          - $ref: '#/components/schemas/RateCardEntitlement'
          description: |-
            The entitlement of the rate card.
            Only available when featureKey is set.
        taxConfig:
          allOf:
          - $ref: '#/components/schemas/TaxConfig'
          description: |-
            The tax config of the rate card.
            When undefined, the tax config of the feature or the default tax config of the plan is used.
          title: Tax config
        billingCadence:
          description: The billing cadence of the rate card.
          format: duration
          title: Billing cadence
          type: string
        price:
          allOf:
          - $ref: '#/components/schemas/RateCardUsageBasedPrice'
          description: |-
            The price of the rate card.
