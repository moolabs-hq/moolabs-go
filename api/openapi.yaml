openapi: 3.1.0
info:
  description: Unified Moolabs SDK covering billing (CLS) and usage (Meter) operations.
    Both surfaces share one client and one auth flow.
  title: Moolabs API
  version: 0.0.0-rc2
servers:
- url: /
paths:
  /health:
    get:
      description: |-
        Health check endpoint.

        BUG-0-006: Enhanced health check to verify database schema exists.
      operationId: healthCheck
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Health Check
  /:
    get:
      description: Root endpoint.
      operationId: root
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      summary: Root
  /v1/wallets:
    get:
      description: |-
        List wallets with optional filters.

        - If subscription_id is provided, finds wallets via grants (most direct, no hardcoded resolution)
        - If subject_id is provided, tenant_id and pool_id are automatically resolved
        - If neither is provided, tenant_id and pool_id are required
        - Optionally filters by owner_type and owner_id
        - Returns list of wallets matching the filters
      operationId: listWallets
      parameters:
      - description: Tenant identifier (optional if subject_id or subscription_id
          provided)
        explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: Credit pool identifier (optional if subject_id or subscription_id
          provided)
        explode: true
        in: query
        name: pool_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: "Subject identifier (if provided, tenant_id and pool_id are auto-resolved)"
        explode: true
        in: query
        name: subject_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Subscription identifier (finds wallets via grants with this subscription_id)
        explode: true
        in: query
        name: subscription_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Optional owner_type filter
        explode: true
        in: query
        name: owner_type
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Optional owner_id filter
        explode: true
        in: query
        name: owner_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Effective as-of timestamp (business time) for time travel
        explode: true
        in: query
        name: effective_as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Recorded as-of timestamp (system time) for time travel
        explode: true
        in: query
        name: recorded_as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Use strong consistency for reads
        explode: true
        in: query
        name: consistent_view
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Wallets
      tags:
      - v1
    post:
      description: |-
        Create or upsert a wallet.

        - Validates hierarchy (depth, cycles)
        - Auto-creates SYSTEM wallet if needed
        - Returns wallet details
      operationId: createWallet
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWalletRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Wallet
      tags:
      - v1
  /v1/wallets/resolve:
    get:
      description: |-
        Resolve tenant_id and pool_id for a given subject_id.

        This endpoint automatically finds the tenant_id and pool_id for a customer/subject
        by looking up their wallet memberships. This allows the UI to query wallets/grants
        without requiring the user to manually configure tenant_id and pool_id.

        Returns:
            {
                "tenant_id": "uuid",
                "pool_id": "uuid" (Global Credits pool for the tenant)
            }
      operationId: resolveTenantAndPool
      parameters:
      - description: Subject identifier (customer ID or subject key)
        explode: true
        in: query
        name: subject_id
        required: true
        schema:
          description: Subject identifier (customer ID or subject key)
          title: Subject Id
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Resolve Tenant And Pool
      tags:
      - v1
  /v1/wallets/{wallet_id}/activity:
    get:
      description: |-
        Get wallet activity (journal entries) for a specific wallet.

        Returns ALL journal entry types (burns, mints, adjustments, expiry, topup, transfer, system).
        For entries with burn allocations, shows the burn amount as negative delta.
        For grant mints, shows the grant amount as positive delta.
        For other entry types, calculates delta based on entry type.
      operationId: getWalletActivity
      parameters:
      - explode: false
        in: path
        name: wallet_id
        required: true
        schema:
          format: uuid
          title: Wallet Id
          type: string
        style: simple
      - description: Start time for activity range
        explode: true
        in: query
        name: from_effective_at
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: End time for activity range
        explode: true
        in: query
        name: to_effective_at
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Effective as-of timestamp (business time) for time travel
        explode: true
        in: query
        name: effective_as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Recorded as-of timestamp (system time) for time travel
        explode: true
        in: query
        name: recorded_as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Use strong consistency for reads
        explode: true
        in: query
        name: consistent_view
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Maximum number of items to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          description: Maximum number of items to return
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Wallet Activity
      tags:
      - v1
  /v1/wallets/{wallet_id}/members:
    get:
      description: |-
        Get wallet members (subjects bound to a wallet).

        Returns list of subjects that are bound to the specified wallet.
      operationId: getWalletMembers
      parameters:
      - explode: false
        in: path
        name: wallet_id
        required: true
        schema:
          format: uuid
          title: Wallet Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Wallet Members
      tags:
      - v1
  /v1/wallets/{wallet_id}:
    get:
      description: Get wallet details by ID.
      operationId: getWallet
      parameters:
      - explode: false
        in: path
        name: wallet_id
        required: true
        schema:
          format: uuid
          title: Wallet Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Wallet
      tags:
      - v1
  /v1/wallets/{wallet_id}/thresholds:
    patch:
      description: |-
        Update wallet thresholds.

        Updates local_soft_threshold_micros and/or local_hard_cap_micros.
        Setting a value to null removes the wallet override (reverts to inherited).
      operationId: updateWalletThresholds
      parameters:
      - explode: false
        in: path
        name: wallet_id
        required: true
        schema:
          format: uuid
          title: Wallet Id
          type: string
        style: simple
      - description: Optional tenant identifier for validation
        explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: Optional pool identifier for validation
        explode: true
        in: query
        name: pool_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWalletThresholdsRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update Wallet Thresholds
      tags:
      - v1
  /v1/wallets/{wallet_id}/settings:
    patch:
      description: |-
        Update wallet settings.

        Updates parent_wallet_id, local_hard_cap_micros, and/or policy.
        - Setting parent_wallet_id to null detaches the wallet from hierarchy
        - Setting local_hard_cap_micros to null removes the override (reverts to inherited)
        - Policy controls at-cap behavior (SOFT_BORROW, HARD_BUDGET, NOTIFY_ONLY)
      operationId: updateWalletSettings
      parameters:
      - explode: false
        in: path
        name: wallet_id
        required: true
        schema:
          format: uuid
          title: Wallet Id
          type: string
        style: simple
      - description: Optional tenant identifier for validation
        explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: Optional pool identifier for validation
        explode: true
        in: query
        name: pool_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWalletSettingsRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Update Wallet Settings
      tags:
      - v1
  /v1/wallets/members:
    post:
      description: |-
        Bind a subject to a wallet.

        Creates or updates wallet_members entry.
      operationId: bindSubjectToWallet
      parameters:
      - explode: true
        in: query
        name: tenant_id
        required: true
        schema:
          format: uuid
          title: Tenant Id
          type: string
        style: form
      - explode: true
        in: query
        name: pool_id
        required: true
        schema:
          format: uuid
          title: Pool Id
          type: string
        style: form
      - explode: true
        in: query
        name: subject_id
        required: true
        schema:
          title: Subject Id
          type: string
        style: form
      - explode: true
        in: query
        name: wallet_id
        required: true
        schema:
          format: uuid
          title: Wallet Id
          type: string
        style: form
      responses:
        "201":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Bind Subject To Wallet
      tags:
      - v1
  /v1/wallets/allocate:
    post:
      description: |-
        Allocate credits from source wallet to target wallet.

        Server-side validation:
        - Both wallets must belong to the same tenant and pool.
        - Source must have sufficient transferable balance.
        - Creates double-entry journal entries (JournalEntry header + JournalPosting lines).
      operationId: allocateCredits
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllocateCreditsRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Allocate Credits
      tags:
      - v1
  /v1/wallet_members:
    get:
      description: |-
        List wallet members with optional filters.

        - Filters by tenant_id and pool_id (required)
        - Optionally filters by subject_id or wallet_id
        - Returns list of wallet members matching the filters
        - Includes resolved tenant_id and pool_id in response headers
      operationId: listWalletMembers
      parameters:
      - description: Tenant identifier
        explode: true
        in: query
        name: tenant_id
        required: true
        schema:
          description: Tenant identifier
          format: uuid
          title: Tenant Id
          type: string
        style: form
      - description: Credit pool identifier
        explode: true
        in: query
        name: pool_id
        required: true
        schema:
          description: Credit pool identifier
          format: uuid
          title: Pool Id
          type: string
        style: form
      - description: Optional subject_id filter
        explode: true
        in: query
        name: subject_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Optional wallet_id filter
        explode: true
        in: query
        name: wallet_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Wallet Members
      tags:
      - v1
  /v1/grants:
    get:
      description: |-
        List grants.

        Returns grants for a tenant/pool, optionally filtered by wallet_id, subject_id, subscription_id,
        feature_key, meter_slug, or as_of timestamp.

        If subject_id or subscription_id is provided but tenant_id/pool_id are not, they will be auto-resolved.
      operationId: listGrants
      parameters:
      - description: Tenant identifier (optional if subject_id or subscription_id
          provided)
        explode: true
        in: query
        name: tenant_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: Pool identifier (optional if subject_id or subscription_id provided)
        explode: true
        in: query
        name: pool_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: Wallet identifier to filter by
        explode: true
        in: query
        name: wallet_id
        required: false
        schema:
          format: uuid
          nullable: true
          type: string
        style: form
      - description: "Subject identifier (for finding wallet, auto-resolves tenant_id/pool_id)"
        explode: true
        in: query
        name: subject_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: "Subscription identifier (filters grants by subscription, auto-resolves\
          \ tenant_id/pool_id)"
        explode: true
        in: query
        name: subscription_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Feature key for scope filtering
        explode: true
        in: query
        name: feature_key
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Meter slug for scope filtering
        explode: true
        in: query
        name: meter_slug
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: "As-of timestamp for time travel (legacy, use effective_as_of\
          \ instead)"
        explode: true
        in: query
        name: as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Effective as-of timestamp (business time) for time travel
        explode: true
        in: query
        name: effective_as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Recorded as-of timestamp (system time) for time travel
        explode: true
        in: query
        name: recorded_as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: Use strong consistency for reads
        explode: true
        in: query
        name: consistent_view
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: Maximum number of grants to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          description: Maximum number of grants to return
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
        style: form
      - description: Offset for pagination
        explode: true
        in: query
        name: offset
        required: false
        schema:
          default: 0
          description: Offset for pagination
          minimum: 0
          title: Offset
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantsListResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: List Grants
      tags:
      - v1
  /v1/grants/mint:
    post:
      description: |-
        Mint a new credit grant.

        Features:
        - Idempotent minting (UNIQUE constraint on tenant_id, source_id, shard_index)
        - Scope support (ALL, FEATURE_LIST, METER_LIST)
        - Rollover configuration
        - Cost basis (FX locking for paid grants)
        - Sharding support (for large TOPUP grants)

        Returns:
            Created or existing grant
      operationId: mintGrant
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGrantRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Mint Grant
      tags:
      - v1
  /v1/grants/{grant_id}:
    get:
      description: Get grant details by ID.
      operationId: getGrant
      parameters:
      - explode: false
        in: path
        name: grant_id
        required: true
        schema:
          format: uuid
          title: Grant Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Grant
      tags:
      - v1
  /v1/grants/{grant_id}/void:
    post:
      description: |-
        Void a grant.

        This marks the grant as voided, making the remaining credits unavailable.
        The grant cannot be un-voided.
      operationId: voidGrant
      parameters:
      - explode: false
        in: path
        name: grant_id
        required: true
        schema:
          format: uuid
          title: Grant Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoidGrantRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GrantResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Void Grant
      tags:
      - v1
  /v1/rate_cards:
    post:
      description: |-
        Create a new rate card.

        Features:
        - Non-overlap constraint enforcement (no overlapping time ranges)
        - Rate card versioning
        - Pricing model fingerprinting

        Returns:
            Created rate card
      operationId: createRateCard
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRateCardRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateCardResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Create Rate Card
      tags:
      - v1
  /v1/rate_cards/{rate_card_id}:
    get:
      description: Get rate card details by ID.
      operationId: getRateCard
      parameters:
      - explode: false
        in: path
        name: rate_card_id
        required: true
        schema:
          format: uuid
          title: Rate Card Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateCardResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Get Rate Card
      tags:
      - v1
  /v1/ledger/state:
    get:
      description: |-
        Get wallet state (balance and credit state).

        - Eventually consistent by default (fast, uses denormalized remaining_micros)
        - STRONG consistency available for admin/debug (slower, uses state projection)
        - Returns balance, state (OK/LOW/OVERDRAFT/OVER_CAP), and metadata
        - Includes last_projected_at and projected_from_recorded_cut for STRONG consistency
        - Sets cache headers for eventual consistency reads
      operationId: getWalletState
      parameters:
      - description: Tenant identifier
        explode: true
        in: query
        name: tenant_id
        required: true
        schema:
          description: Tenant identifier
          format: uuid
          title: Tenant Id
          type: string
        style: form
      - description: Credit pool identifier
        explode: true
        in: query
        name: pool_id
        required: true
        schema:
          description: Credit pool identifier
          format: uuid
          title: Pool Id
          type: string
        style: form
      - description: Wallet identifier
        explode: true
        in: query
        name: wallet_id
        required: true
        schema:
          description: Wallet identifier
          format: uuid
          title: Wallet Id
          type: string
        style: form
      - description: "As-of timestamp (for time travel, legacy, use effective_as_of\
          \ instead)"
        explode: true
        in: query
        name: as_of
        required: false
        schema:
          format: date-time
          nullable: true
          type: string
        style: form
      - description: "Consistency level: 'eventual' or 'STRONG'"
        explode: true
        in: query
        name: consistency
        required: false
