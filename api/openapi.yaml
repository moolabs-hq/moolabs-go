      description: |-
        Request body for creating an internal team member.

        Note: ``user_id`` is intentionally NOT a body field — it's
        resolved server-side from the authenticated request context
        (``X-User-Id`` header / future JWT claim) to prevent forgery of
        the team-member identity (Issue C3 — mass-assignment guard).
        Callers register *themselves* on the account team; admin
        workflows that need to register on behalf of others should use
        a future ``POST /admin/...`` endpoint that explicitly checks
        admin role.
