    post:
      description: |-
        Process period-close rollover for a subscription.

        This endpoint:
        - Computes period boundaries based on subscription anchor_at and cadence
        - Identifies eligible grants with rollover enabled
        - Calculates rollover amounts (FULL or PARTIAL)
        - Creates rollover grants
        - Creates ROLLOVER journal entries
        - Emits BILLING_CYCLE_CLOSED outbox events

        Uses advisory locks to prevent concurrent closes.
      operationId: processRollover
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RolloverRequest'
        required: true
      responses:
        "200":
