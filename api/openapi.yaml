    EntitlementMetered:
      description: |-
        Metered entitlements are useful for many different use cases, from setting up usage based access to implementing complex credit systems.
        Access is determined based on feature usage using a balance calculation (the "usage allowance" provided by the issued grants is "burnt down" by the usage).
      example:
        metadata: ""
        issueAfterReset: 0.08008281904610115
        preserveOverageAtReset: false
        annotations:
          subscription.id: sub_123
        activeTo: 2023-01-01T01:01:01.001Z
        usagePeriod: ""
        type: metered
        isSoftLimit: false
        featureKey: example-feature-key
        measureUsageFrom: 2023-01-01T01:01:01.001Z
        issueAfterResetPriority: 154
        createdAt: 2024-01-01T01:01:01.001Z
        deletedAt: 2024-01-01T01:01:01.001Z
        isUnlimited: false
        id: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        lastReset: 2023-01-01T01:01:01.001Z
        currentUsagePeriod: ""
        subjectKey: customer-1
        activeFrom: 2023-01-01T01:01:01.001Z
        featureId: 01ARZ3NDEKTSV4RRFFQ69G5FAV
        updatedAt: 2024-01-01T01:01:01.001Z
      properties:
        type:
          enum:
          - metered
          type: string
        isSoftLimit:
          default: false
          description: "If softLimit=true the subject can use the feature even if\
            \ the entitlement is exhausted, hasAccess will always be true."
          title: Soft limit
          type: boolean
        isUnlimited:
          default: false
          deprecated: true
          description: "Deprecated, ignored by the backend. Please use isSoftLimit\
            \ instead; this field will be removed in the future."
          type: boolean
        issueAfterReset:
          description: |-
            You can grant usage automatically alongside the entitlement, the example scenario would be creating a starting balance.
            If an amount is specified here, a grant will be created alongside the entitlement with the specified amount.
            That grant will have it's rollover settings configured in a way that after each reset operation, the balance will return the original amount specified here.
            Manually creating such a grant would mean having the "amount", "minRolloverAmount", and "maxRolloverAmount" fields all be the same.
          format: double
          minimum: 0
          title: Initial grant amount
          type: number
        issueAfterResetPriority:
          default: 1
          description: Defines the grant priority for the default grant.
          format: uint8
          maximum: 255
          minimum: 1
          title: Issue grant after reset priority
          type: integer
        preserveOverageAtReset:
          default: false
          description: "If true, the overage is preserved at reset. If false, the\
            \ usage is reset to 0."
          title: Preserve overage at reset
          type: boolean
        createdAt:
          description: Timestamp of when the resource was created.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Creation Time
          type: string
        updatedAt:
          description: Timestamp of when the resource was last updated.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Last Update Time
          type: string
        deletedAt:
          description: Timestamp of when the resource was permanently deleted.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Deletion Time
          type: string
        metadata:
          allOf:
          - $ref: '#/components/schemas/Metadata'
          description: Additional metadata for the feature.
        activeFrom:
          description: The cadence start of the resource.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          type: string
        activeTo:
          description: The cadence end of the resource.
          example: 2023-01-01T01:01:01.001Z
          format: date-time
