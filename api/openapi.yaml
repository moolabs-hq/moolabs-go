      - name
      - usageAttribution
    CustomerSubscriptionOrderBy:
      description: Order by options for customer subscriptions.
      enum:
      - activeFrom
      - activeTo
      type: string
    CustomerUsageAttribution:
      description: |-
        Mapping to attribute metered usage to the customer.
        One customer can have zero or more subjects,
        but one subject can only belong to one customer.
      properties:
        subjectKeys:
          description: |-
            The subjects that are attributed to the customer.
            Can be empty when no subjects are associated with the customer.
          items:
            description: SubjectKey is a key that is used to identify a subject.
            minLength: 1
            type: string
          minItems: 0
          type: array
      required:
      - subjectKeys
    DiscountPercentage:
      description: Percentage discount.
      properties:
        percentage:
          allOf:
          - $ref: '#/components/schemas/Percentage'
          description: The percentage of the discount.
          maximum: 100
          minimum: 0
          title: Percentage
      required:
      - percentage
    DiscountReasonMaximumSpend:
      description: The reason for the discount is a maximum spend.
      properties:
        type:
          enum:
          - maximum_spend
          type: string
      required:
      - type
    DiscountReasonRatecardPercentage:
      description: The reason for the discount is a ratecard percentage.
      properties:
        type:
          enum:
          - ratecard_percentage
          type: string
        percentage:
          allOf:
          - $ref: '#/components/schemas/Percentage'
          description: The percentage of the discount.
          maximum: 100
          minimum: 0
          title: Percentage
        correlationId:
          description: |-
            Correlation ID for the discount.

            This is used to link discounts across different invoices (progressive billing use case).

            If not provided, the invoicing engine will auto-generate one. When editing an invoice line,
            please make sure to keep the same correlation ID of the discount or in progressive billing
            setups the discount amounts might be incorrect.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
      required:
      - percentage
      - type
    DiscountReasonRatecardUsage:
      description: The reason for the discount is a ratecard usage.
      properties:
        type:
          enum:
          - ratecard_usage
          type: string
        quantity:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: |-
            The quantity of the usage discount.

            Must be positive.
          title: Usage
        correlationId:
          description: |-
            Correlation ID for the discount.

            This is used to link discounts across different invoices (progressive billing use case).

            If not provided, the invoicing engine will auto-generate one. When editing an invoice line,
            please make sure to keep the same correlation ID of the discount or in progressive billing
            setups the discount amounts might be incorrect.
          example: 01G65Z755AFWAKHE12NY0CQ9FH
          pattern: "^[0-7][0-9A-HJKMNP-TV-Za-hjkmnp-tv-z]{25}$"
          type: string
      required:
      - quantity
      - type
    DiscountReasonType:
      description: The type of the discount reason.
      enum:
      - maximum_spend
      - ratecard_percentage
      - ratecard_usage
      type: string
    DiscountUsage:
      description: |-
        Usage discount.

        Usage discount means that the first N items are free. From billing perspective
        this means that any usage on a specific feature is considered 0 until this discount
        is exhausted.
      properties:
        quantity:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: |-
            The quantity of the usage discount.

            Must be positive.
          title: Usage
      required:
      - quantity
    Discounts:
      description: Discount by type on a price
      properties:
        percentage:
          allOf:
          - $ref: '#/components/schemas/DiscountPercentage'
          description: The percentage discount.
        usage:
          allOf:
          - $ref: '#/components/schemas/DiscountUsage'
          description: The usage discount.
    DynamicPrice:
      description: |-
        Dynamic price.

        The underlying meter's value is considered the base price in the
        customer's currency.

        The rate specifies the markup over the price.
      properties:
        type:
          description: The type of the price.
          enum:
          - dynamic
          type: string
        multiplier:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: |-
            The multiplier to apply to the base price to get the dynamic price.

            Examples:
            - 0.0: the price is zero
            - 0.5: the price is 50% of the base price
            - 1.0: the price is the same as the base price
            - 1.5: the price is 150% of the base price
          title: The multiplier to apply to the base price to get the dynamic price
      required:
      - type
    DynamicPriceWithCommitments:
      description: Dynamic price with spend commitments.
      properties:
        type:
          description: The type of the price.
          enum:
          - dynamic
          type: string
        multiplier:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: |-
            The multiplier to apply to the base price to get the dynamic price.

            Examples:
            - 0.0: the price is zero
            - 0.5: the price is 50% of the base price
            - 1.0: the price is the same as the base price
            - 1.5: the price is 150% of the base price
          title: The multiplier to apply to the base price to get the dynamic price
        minimumAmount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The customer is committed to spend at least the amount.
          title: Minimum amount
        maximumAmount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The customer is limited to spend at most the amount.
          title: Maximum amount
      required:
      - type
