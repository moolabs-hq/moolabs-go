  /v1/rating/rate/{usage_event_id}:
    post:
      description: |-
        Rate a single usage event.

        This endpoint processes a PENDING usage event and creates:
        - Journal entry
        - Postings
        - Burn allocations
        - Updates grants

        Also supports retrying events with retryable statuses:
        - UNPRICED: Can be retried if rate card is added
        - QUARANTINED: Can be retried if guardrails are adjusted
        - WAITING_FUNDS: Can be retried if funds are added

        Returns:
            Created journal entry or error
      operationId: rateEvent
      parameters:
      - explode: false
        in: path
        name: usage_event_id
        required: true
        schema:
          format: uuid
