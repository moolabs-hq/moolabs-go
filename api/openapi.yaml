    PackagePrice:
      description: |-
        Package price.

        The item is sold in packages. Each package contains quantityPerPackage items, the price of the
        package is set in amount.

        The total price of the usage will be enough packages that can accomodate all the usage.

        Examples (given a package size of 20, and an amount of $10):
        - if the quantity is 98, the price will be 5*$10=$50.
        - if the quantity is zero, the price will be 0*$10=$0, as even the first package is not purchased.
        - if the quantity is 20, the price will be 1*$10=$10, as the usage fits into the first package.
        - if the quantity is 20.1, the price will be 2*$10=$20, as the additional 0.1 usage (compared to the
        previous example) requires a new package.
      properties:
        type:
          description: The type of the price.
          enum:
          - package
          type: string
        amount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The price of one package.
          title: Amount
        quantityPerPackage:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The quantity per package.
          title: Quantity per package
      required:
      - amount
      - quantityPerPackage
      - type
    PackagePriceWithCommitments:
      description: Package price with spend commitments.
      properties:
        type:
          description: The type of the price.
          enum:
          - package
          type: string
        amount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The price of one package.
          title: Amount
        quantityPerPackage:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The quantity per package.
          title: Quantity per package
        minimumAmount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The customer is committed to spend at least the amount.
          title: Minimum amount
        maximumAmount:
          allOf:
          - $ref: '#/components/schemas/Numeric'
          description: The customer is limited to spend at most the amount.
          title: Maximum amount
      required:
      - amount
      - quantityPerPackage
      - type
