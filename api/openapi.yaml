  /v1/tenant/moometer-namespace:
    get:
      description: |-
        MooMeter namespace for the authenticated tenant.

        Clerk/org-backed tenants are stored internally by UUID, but their MooMeter
        namespace is the external org ID. The UI uses this value for direct
        OpenMeter proxy calls such as customer subscriptions.

        Response shape:
          - ``namespace`` (preferred): the MooMeter namespace string.
          - ``internal_tenant_id``: the BFF tenant UUID (for debugging/correlation).
          - ``tenant_id`` (DEPRECATED — same as ``namespace``): kept for one
            rolling deploy window so the UI keeps working during the BFF→UI
            upgrade. The UI already prefers ``namespace``; remove this field
            once all UI deploys are on the new helper. Do not use this field
            from any new caller — it does NOT contain the internal UUID.
      operationId: getMoometerNamespaceIdV1
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Moometer Namespace Id
      tags:
      - tenant
  /v1/tenant/context:
    get:
      description: |-
        Return tenant info, pools, and current credit economics for the authenticated tenant.

        Used by the Settings overview and billing pages. Requires portal token or API key.
      operationId: getTenantContext
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get Tenant Context
      tags:
      - tenant
  /v1/tenant/config:
    get:
      description: |-
        Return the authenticated tenant's region and regional endpoints.

        SDKs call this once at startup to discover which ingest endpoint to use.
        The response is cacheable for 1 hour.
      operationId: getTenantConfig
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenantConfigResponse'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get tenant regional config for SDK auto-discovery
      tags:
      - tenant-config
