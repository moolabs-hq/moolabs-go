    CaseUpdate:
      description: "PATCH /cases/{id} — partial update."
      example:
        metadata:
          key: ""
        case_owner_team: case_owner_team
        assigned_agent: assigned_agent
        assigned_human: assigned_human
        risk_tier: risk_tier
        status_reason: status_reason
        autonomy_level: 1
        status: status
      properties:
        risk_tier:
          title: Risk Tier
          type: string
          nullable: true
        assigned_agent:
          maxLength: 100
          title: Assigned Agent
          type: string
          nullable: true
        assigned_human:
          maxLength: 255
          title: Assigned Human
          type: string
          nullable: true
        case_owner_team:
          maxLength: 100
          title: Case Owner Team
          type: string
          nullable: true
        autonomy_level:
          description: "Per-case autonomy override (1=inform-only, 5=fully autonomous).\
            \ Capped by the orchestrator agent policy's max_autonomy."
          maximum: 5.0
          minimum: 1.0
          title: Autonomy Level
          type: integer
          nullable: true
        metadata:
          additionalProperties: {}
          title: Metadata
          nullable: true
        status:
          description: Target case status. Goes through the FSM in case_state.transition_case
            so an invalid transition (e.g. closed → open without a reason) returns
            422.
          title: Status
          type: string
          nullable: true
        status_reason:
          maxLength: 500
          title: Status Reason
          type: string
          nullable: true
      title: CaseUpdate
