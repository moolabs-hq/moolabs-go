      properties:
        effectiveAt:
          description: "The time at which the reset takes effect, defaults to now.\
            \ The reset cannot be in the future. The provided value is truncated to\
            \ the minute due to how historical meter data is stored."
          example: 2023-01-01T01:01:01.001Z
