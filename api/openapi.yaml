          allOf:
          - $ref: '#/components/schemas/Alignment'
          description: Alignment configuration for the plan.
        version:
          default: 1
          description: Version of the plan. Incremented when the plan is updated.
          minimum: 1
          readOnly: true
          title: Version
          type: integer
        currency:
          allOf:
          - $ref: '#/components/schemas/CurrencyCode'
          description: The currency code of the plan.
          title: Currency
        billingCadence:
          description: |-
            The default billing cadence for subscriptions using this plan.
            Defines how often customers are billed using ISO8601 duration format.
            Examples: "P1M" (monthly), "P3M" (quarterly), "P1Y" (annually).
          example: P1M
          format: duration
          title: Billing cadence
          type: string
        proRatingConfig:
          allOf:
          - $ref: '#/components/schemas/ProRatingConfig'
          description: Default pro-rating configuration for subscriptions using this
            plan.
          title: Pro-rating configuration
        creditConfig:
          allOf:
          - $ref: '#/components/schemas/CreditConfig'
          description: Default credit allowance configuration for subscriptions using
            this plan (first-class column).
          title: Credit configuration
        effectiveFrom:
          description: "The date and time when the plan becomes effective. When not\
            \ specified, the plan is a draft."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Effective start date
          type: string
        effectiveTo:
          description: "The date and time when the plan is no longer effective. When\
            \ not specified, the plan is effective indefinitely."
          example: 2023-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Effective end date
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/PlanStatus'
          description: |-
            The status of the plan.
            Computed based on the effective start and end dates:
            - draft = no effectiveFrom
            - active = effectiveFrom <= now < effectiveTo
            - archived / inactive = effectiveTo <= now
            - scheduled = now < effectiveFrom < effectiveTo
          readOnly: true
          title: Status
        phases:
          description: |-
            The plan phase or pricing ramp allows changing a plan's rate cards over time as a subscription progresses.
            A phase switch occurs only at the end of a billing period, ensuring that a single subscription invoice will not include charges from different phase prices.
          items:
            $ref: '#/components/schemas/PlanPhase'
          minItems: 1
          type: array
        validationErrors:
          description: List of validation errors.
          items:
            $ref: '#/components/schemas/MeterValidationError'
          type: array
          nullable: true
      required:
      - billingCadence
      - createdAt
      - currency
      - id
      - key
      - name
      - phases
      - status
      - updatedAt
      - validationErrors
      - version
