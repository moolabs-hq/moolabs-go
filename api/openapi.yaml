          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
          title: Creation Time
          type: string
        updatedAt:
          description: Timestamp of when the resource was last updated.
          example: 2024-01-01T01:01:01.001Z
          format: date-time
          readOnly: true
